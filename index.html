<html lang="en">

<head>

    <style>
        :root {
            /* Stadium-night palette */
            --void: #05070f;
            --void-2: #080c1a;
            --ink: #0d1426;
            --panel: rgba(17, 24, 43, 0.72);
            --panel-solid: #111a2e;
            --line: rgba(148, 173, 255, 0.12);
            --line-strong: rgba(148, 173, 255, 0.22);

            --gold: #f5b841;       /* auctioneer floodlight */
            --gold-soft: rgba(245, 184, 65, 0.14);
            --live: #22d3ee;       /* electric cyan */
            --live-soft: rgba(34, 211, 238, 0.14);
            --money: #34d399;      /* emerald */
            --money-soft: rgba(52, 211, 153, 0.14);
            --danger: #fb5e5e;
            --warn: #f59e0b;
            --violet: #8b8cff;

            --text: #eef2ff;
            --muted: #8a98bd;
            --faint: #5b6890;

            --r-lg: 22px;
            --r-md: 15px;
            --r-sm: 10px;
            --shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.8);

            --display: 'Bebas Neue', sans-serif;
            --head: 'Chakra Petch', sans-serif;
            --body: 'Outfit', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: var(--body);
            color: var(--text);
            background: var(--void);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient stadium backdrop */
        #atmosphere {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
            background:
                radial-gradient(1200px 600px at 80% -10%, rgba(245, 184, 65, 0.10), transparent 60%),
                radial-gradient(900px 700px at 8% 110%, rgba(34, 211, 238, 0.10), transparent 55%),
                linear-gradient(180deg, #05070f 0%, #060a16 40%, #04060e 100%);
        }
        #atmosphere::before {
            content: ""; position: absolute; inset: -20% -20% 30% -20%;
            background:
                conic-gradient(from 210deg at 50% 0%, transparent 0deg, rgba(245,184,65,0.06) 12deg, transparent 26deg, transparent 60deg, rgba(34,211,238,0.05) 74deg, transparent 90deg);
            filter: blur(2px);
            animation: sweep 14s linear infinite;
            opacity: 0.7;
        }
        #atmosphere::after {
            content: ""; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.5) 0.5px, transparent 0.5px);
            background-size: 3px 3px; opacity: 0.035;
            mix-blend-mode: screen;
        }
        @keyframes sweep { to { transform: rotate(360deg); } }

        .grain {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5;
            background:
                radial-gradient(120% 120% at 50% -20%, transparent 55%, rgba(0,0,0,0.55) 100%);
        }

        #root { position: relative; z-index: 2; }

        /* ---------- Scrollbars ---------- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148,173,255,0.18); border-radius: 20px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148,173,255,0.32); background-clip: padding-box; }

        /* ---------- Shell ---------- */
        .shell { max-width: 1480px; margin: 0 auto; padding: 0 20px 120px; }

        .topbar {
            position: sticky; top: 0; z-index: 40;
            display: flex; align-items: center; gap: 18px;
            padding: 14px 0 14px; margin-bottom: 8px;
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        }
        .topbar::after {
            content: ""; position: absolute; left: -40px; right: -40px; bottom: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--line-strong) 20%, var(--line-strong) 80%, transparent);
        }
        .topbar-bg { position: absolute; inset: 0; left: -40px; right: -40px; background: linear-gradient(180deg, rgba(5,7,15,0.85), rgba(5,7,15,0.4)); z-index: -1; }

        .brand { display: flex; align-items: center; gap: 13px; flex-shrink: 0; }
        .brand-mark {
            width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center;
            font-size: 1.5rem; position: relative;
            background: linear-gradient(150deg, rgba(245,184,65,0.25), rgba(34,211,238,0.12));
            border: 1px solid var(--line-strong);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 24px -8px rgba(245,184,65,0.4);
        }
        .brand-mark::after {
            content: ""; position: absolute; inset: 0; border-radius: 13px;
            box-shadow: 0 0 0 1px rgba(245,184,65,0.18); animation: markpulse 3s ease-in-out infinite;
        }
        @keyframes markpulse { 0%,100% { box-shadow: 0 0 0 1px rgba(245,184,65,0.0);} 50% { box-shadow: 0 0 0 4px rgba(245,184,65,0.10);} }
        .brand h1 { font-family: var(--head); font-weight: 700; font-size: 1.18rem; letter-spacing: 0.5px; line-height: 1; }
        .brand h1 b { color: var(--gold); font-weight: 700; }
        .brand p { font-size: 0.66rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--faint); margin-top: 4px; font-weight: 600; }

        .nav { display: flex; gap: 4px; margin-left: auto; background: rgba(8,12,24,0.6); padding: 5px; border-radius: 14px; border: 1px solid var(--line); }
        .nav-btn {
            font-family: var(--head); font-weight: 600; font-size: 0.82rem; letter-spacing: 0.3px;
            color: var(--muted); background: transparent; border: none; cursor: pointer;
            padding: 9px 15px; border-radius: 10px; transition: all 0.22s; white-space: nowrap;
            display: flex; align-items: center; gap: 7px;
        }
        .nav-btn:hover { color: var(--text); background: rgba(148,173,255,0.07); }
        .nav-btn.on { color: var(--void); background: linear-gradient(135deg, var(--gold), #ffd27a); box-shadow: 0 8px 22px -8px rgba(245,184,65,0.6); }
        .nav-btn .ico { font-size: 0.95rem; }

        .lock-btn {
            flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
            display: grid; place-items: center; font-size: 1.15rem; transition: all 0.22s;
            background: rgba(8,12,24,0.6); border: 1px solid var(--line);
        }
        .lock-btn:hover { border-color: var(--line-strong); transform: translateY(-1px); }
        .lock-btn.live { border-color: rgba(52,211,153,0.4); background: var(--money-soft); box-shadow: 0 0 18px -6px var(--money); }

        .icon-btn {
            flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
            display: grid; place-items: center; font-size: 1.1rem; transition: all 0.2s;
            background: rgba(8,12,24,0.6); border: 1px solid var(--line); color: var(--muted);
        }
        .icon-btn:hover { border-color: var(--line-strong); color: var(--text); }
        .icon-btn.on { color: var(--live); border-color: rgba(34,211,238,0.4); background: var(--live-soft); }

        /* viewer banner */
        .viewer-banner {
            display: none; text-align: center; font-size: 0.78rem; font-weight: 600; letter-spacing: 1px;
            padding: 7px; color: var(--gold); background: var(--gold-soft);
            border-bottom: 1px solid rgba(245,184,65,0.25);
        }
        body.locked .viewer-banner { display: block; }
        body.locked .admin-only { display: none !important; }
        body.team-mode .viewer-banner { color: var(--live); background: rgba(34,211,238,0.10); border-bottom-color: rgba(34,211,238,0.3); }
        .code-chip { font-family: var(--mono); font-size: 0.74rem; font-weight: 700; color: var(--gold); cursor: pointer;
            background: var(--gold-soft); border: 1px solid rgba(245,184,65,0.35); border-radius: 7px; padding: 2px 8px; user-select: none; transition: filter 0.15s; }
        .code-chip:hover { filter: brightness(1.2); }
        .share-url { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); word-break: break-all; text-align: center; max-width: 280px; }
        .lock-btn.team { color: var(--live); border-color: rgba(34,211,238,0.5); box-shadow: 0 0 0 1px rgba(34,211,238,0.3); }
        .paddle.mine { border-color: var(--team); box-shadow: 0 0 0 1px color-mix(in srgb, var(--team) 60%, transparent); }

        /* ---------- Team War Room ---------- */
        .warroom { display: grid; gap: 18px; }
        .calc-card { border-left: 4px solid var(--team, var(--gold)); }
        .calc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; }
        .calc-team { display: flex; align-items: center; gap: 12px; }
        .calc-team .nm { font-family: var(--head); font-size: 1.25rem; font-weight: 700; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr 1.4fr; gap: 12px; }
        .calc-tile { background: rgba(5,8,18,0.5); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 16px; }
        .calc-tile .l { font-size: 0.66rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
        .calc-tile .v { font-family: var(--display); font-size: 2rem; line-height: 1; letter-spacing: 1px; }
        .calc-tile.big { background: rgba(52,211,153,0.06); border-color: rgba(52,211,153,0.25); }
        .calc-tile.big .v { font-size: 2.6rem; }
        .calc-bar { margin-top: 14px; height: 8px; border-radius: 99px; background: rgba(255,255,255,0.06); overflow: hidden; }
        .calc-bar span { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--money), #6ee7b7); transition: width 0.4s ease; }
        @media (max-width: 720px){ .calc-grid { grid-template-columns: 1fr; } }

        .livenow { display: flex; gap: 14px; align-items: center; }
        .livenow img, .livenow .ph { width: 66px; height: 66px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .livenow .ph { display: grid; place-items: center; font-size: 1.6rem; background: rgba(255,255,255,0.05); color: var(--faint); }
        .ln-name { font-family: var(--head); font-size: 1.15rem; font-weight: 700; }
        .ln-role { font-size: 0.78rem; color: var(--muted); margin: 2px 0 4px; }
        .ln-bid { font-family: var(--display); font-size: 1.5rem; color: var(--money); letter-spacing: 1px; }
        .ln-leader { font-size: 0.9rem; font-family: var(--head); }

        .teams-purse { display: flex; flex-direction: column; gap: 6px; }
        .tp-row { display: grid; grid-template-columns: 10px 1fr auto auto; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 9px; background: rgba(5,8,18,0.4); border: 1px solid var(--line); }
        .tp-row.me { border-color: var(--team); background: color-mix(in srgb, var(--team) 8%, transparent); }
        .tp-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--team); }
        .tp-name { font-weight: 600; font-size: 0.9rem; }
        .tp-count { font-size: 0.7rem; color: var(--muted); font-family: var(--mono); }
        .tp-count::before { content: '👥 '; }
        .tp-purse { font-family: var(--mono); font-size: 0.86rem; color: var(--money); font-weight: 600; }

        .target-scroll { max-height: 58vh; overflow: auto; display: flex; flex-direction: column; gap: 7px; margin-top: 10px; padding-right: 4px; }
        .target-row { display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 10px; background: rgba(5,8,18,0.4); border: 1px solid var(--line); transition: all 0.15s; }
        .target-row.set { border-color: rgba(245,184,65,0.4); background: rgba(245,184,65,0.05); }
        .target-row.live { border-color: var(--live); box-shadow: 0 0 0 1px rgba(34,211,238,0.3); }
        .target-row img, .target-row .ph { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .target-row .ph { display: grid; place-items: center; background: rgba(255,255,255,0.05); color: var(--faint); font-weight: 700; }
        .tr-info { flex: 1; min-width: 0; }
        .tr-name { font-weight: 600; font-size: 0.92rem; display: flex; align-items: center; gap: 7px; }
        .tr-meta { font-size: 0.74rem; color: var(--muted); }
        .tr-budget { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .tr-cr { font-size: 0.7rem; color: var(--faint); font-family: var(--mono); }
        .budget-input { width: 92px; text-align: right; font-family: var(--mono); padding: 7px 10px; }

        /* XI planner */
        .calc-foot { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; font-size: 0.78rem; font-weight: 600; color: var(--muted); }
        .cf.sec { color: var(--money); } .cf.plan { color: var(--gold); } .cf.open { color: var(--faint); }
        .addbar { display: grid; grid-template-columns: 1fr 150px 120px auto; gap: 10px; align-items: center; margin-bottom: 6px; }
        .addbar-cr { display: flex; align-items: center; gap: 6px; }
        .addbar-cr span { font-size: 0.72rem; color: var(--faint); font-family: var(--mono); }
        .addbar-cr input { text-align: right; font-family: var(--mono); }
        @media (max-width: 720px){ .addbar { grid-template-columns: 1fr 1fr; } .addbar > button { grid-column: 1 / -1; } }

        .xi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; margin-top: 14px; }
        .slot-card { border-radius: var(--r-md); border: 1px solid var(--line); background: rgba(5,8,18,0.45); padding: 11px 12px; display: flex; flex-direction: column; gap: 7px; }
        .slot-card.b-sec { border-color: rgba(52,211,153,0.45); background: rgba(52,211,153,0.05); }
        .slot-card.b-plan { border-color: rgba(245,184,65,0.4); }
        .slot-card.b-lost { border-color: rgba(251,94,94,0.4); }
        .slot-card.live { box-shadow: 0 0 0 2px rgba(34,211,238,0.4); }
        .slot-head { display: flex; justify-content: space-between; align-items: center; }
        .slot-no { font-family: var(--head); font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px; }
        .slot-badge { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 99px; text-transform: uppercase; }
        .slot-badge.b-sec { background: rgba(52,211,153,0.15); color: var(--money); }
        .slot-badge.b-plan { background: var(--gold-soft); color: var(--gold); }
        .slot-badge.b-lost { background: rgba(251,94,94,0.12); color: var(--danger); }
        .slot-badge.b-open { background: rgba(255,255,255,0.05); color: var(--faint); }
        .slot-empty { font-size: 0.8rem; color: var(--faint); padding: 4px 0; }
        .cand { display: flex; flex-direction: column; gap: 5px; padding: 8px 0; border-top: 1px solid var(--line); }
        .cand:first-of-type { border-top: none; }
        .cand-top { display: flex; align-items: flex-start; gap: 8px; }
        .cand-rank { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; display: grid; place-items: center; border-radius: 5px; font-size: 0.66rem; font-weight: 800; background: rgba(255,255,255,0.06); color: var(--muted); }
        .cand.pick .cand-rank { background: var(--gold-soft); color: var(--gold); }
        .cand.won .cand-rank { background: rgba(52,211,153,0.18); color: var(--money); }
        .cand-name { flex: 1; min-width: 0; font-size: 0.86rem; font-weight: 600; line-height: 1.2; overflow-wrap: anywhere; }
        .cand-name em { font-style: normal; color: var(--faint); font-size: 0.68rem; display: block; margin-top: 1px; }
        .cand.gone .cand-name { text-decoration: line-through; color: var(--faint); }
        .cand-bottom { display: flex; align-items: center; gap: 6px; padding-left: 26px; }
        .cand-cr { font-size: 0.64rem; color: var(--faint); font-family: var(--mono); }
        .cand-bud-input { width: 100%; max-width: 130px; text-align: right; font-family: var(--mono); padding: 6px 9px; font-size: 0.82rem; }
        .cand-won { font-family: var(--mono); font-size: 0.82rem; color: var(--money); font-weight: 600; }
        .cand-gone { font-size: 0.72rem; color: var(--danger); }
        .cand-act { display: flex; gap: 2px; flex-shrink: 0; }
        .cand-act button { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.82rem; padding: 2px 5px; border-radius: 4px; line-height: 1; }
        .cand-act button:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .slot-foot { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
        .slot-foot.sec { color: var(--money); } .slot-foot.lost { color: var(--danger); }
        .slot-foot b { color: #fff; font-weight: 600; }

        /* Team bidding panel */
        /* Top live-bid bar (team page) */
        .bidbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
            border: 1px solid color-mix(in srgb, var(--team, var(--gold)) 45%, var(--line)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--team, var(--gold)) 18%, transparent); }
        .bidbar-info { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 220px; }
        .bidbar-img, .bidbar-ph { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.05); }
        .bidbar-ph { display: grid; place-items: center; font-family: var(--display); font-size: 2rem; color: var(--faint); }
        .bidbar-name { font-family: var(--head); font-weight: 700; font-size: 1.2rem; }
        .bidbar-role { font-size: 0.72rem; color: var(--faint); font-weight: 600; }
        .bidbar-cur { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }
        .bidbar-cur b { font-family: var(--mono); color: #fff; }
        .bidbar-action { width: 220px; flex-shrink: 0; }
        .bidbar-wait { opacity: 0.85; border-style: dashed; }
        @media (max-width: 560px){ .bidbar-action { width: 100%; } }

        .teambid { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
        .btn-bid { width: 100%; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            border: none; border-radius: var(--r-md); cursor: pointer; color: #fff; font-family: var(--head); letter-spacing: 1px;
            background: linear-gradient(135deg, var(--team, var(--gold)), color-mix(in srgb, var(--team, var(--gold)) 60%, #000));
            box-shadow: 0 14px 30px -12px color-mix(in srgb, var(--team, var(--gold)) 70%, transparent); transition: transform 0.1s, box-shadow 0.2s; }
        .btn-bid:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 18px 38px -12px color-mix(in srgb, var(--team, var(--gold)) 85%, transparent); }
        .btn-bid:active:not(:disabled) { transform: translateY(1px); }
        .btn-bid:disabled { opacity: 0.45; cursor: not-allowed; background: rgba(255,255,255,0.07); color: var(--muted); box-shadow: none; }
        .btn-bid .bid-lbl { font-size: 0.85rem; font-weight: 700; }
        .btn-bid .bid-amt { font-family: var(--display); font-size: 1.9rem; line-height: 1; }
        .teambid-lead { padding: 16px; border-radius: var(--r-md); text-align: center; font-weight: 700; font-family: var(--head);
            color: var(--money); background: var(--money-soft); border: 1px solid rgba(52,211,153,0.3); }

        /* All squads (team view) */
        .squad-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
        .squad-card { border-radius: var(--r-md); border: 1px solid var(--line); border-top: 3px solid var(--team, var(--gold)); background: rgba(5,8,18,0.45); padding: 12px 14px; }

const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

/* ============================ HELPERS ============================ */
// All money is stored internally in LAKHS. 100 L = 1 Cr.
function formatCr(lakhs) {
  if (lakhs === undefined || lakhs === null || lakhs === '-') return '-';
  const cr = lakhs / 100;
  if (Math.abs(cr) >= 1) return parseFloat(cr.toFixed(2)) + ' Cr';
  return parseFloat(lakhs.toFixed(2)) + ' L';
}
function normalizeRole(role) { return (role || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }
const ROLES = ['Batsman', 'Bowler', 'All-Rounder', 'Wicket-Keeper'];

// Deterministic team color from name (stable across all devices)
function teamColor(name) {
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
  return `hsl(${h}, 72%, 60%)`;

  teams: [],
  players: [],
  settings: {
    setsEnabled: false,
    sets: { 1: 'Batsman', 2: 'Bowler', 3: 'All-Rounder', 4: 'Wicket-Keeper' },
    bidRules: { tiers: [
      { maxVal: 5,  maxUnit: 100, incVal: 20, incUnit: 1 },
      { maxVal: 10, maxUnit: 100, incVal: 25, incUnit: 1 },
      { maxVal: 25, maxUnit: 100, incVal: 50, incUnit: 1 },
      { maxVal: 999999, maxUnit: 1, incVal: 1, incUnit: 100 },

    teamLoginEnabled: false,

  },
  state: {
    currentSetIndex: 1, currentItem: null, currentBid: 0, currentBidder: null,

function getDynamicIncrement(currentBid, settings) {
  const tiers = settings?.bidRules?.tiers;
  if (!tiers) { return currentBid < 1000 ? 50 : 100; }
  if (currentBid < tiers[0].maxVal * tiers[0].maxUnit) return tiers[0].incVal * tiers[0].incUnit;
  if (currentBid < tiers[1].maxVal * tiers[1].maxUnit) return tiers[1].incVal * tiers[1].incUnit;
  if (currentBid < tiers[2].maxVal * tiers[2].maxUnit) return tiers[2].incVal * tiers[2].incUnit;
  return tiers[3].incVal * tiers[3].incUnit;

// Squad-reserve affordability gate — identical math to original tool
function paddleState(team, data) {
  const s = data.state, sq = data.settings.squadRules || { min: 11, max: 15, reservePerSlot: 100 };
  const isLeader = String(s.currentBidder) === String(team.id);
  const hasItem = !!s.currentItem;
  const actualCount = data.players.filter(p => p.soldTo === team.name && p.status === 'sold').length;
  const nextBid = s.currentBidder ? s.currentBid + getDynamicIncrement(s.currentBid, data.settings) : s.currentBid;
  const slotsAfterWin = Math.max(0, sq.min - (actualCount + 1));
  const reserveNeeded = slotsAfterWin * sq.reservePerSlot;
  const budgetAfterBid = team.remaining - nextBid;
  const cantAfford = team.remaining < nextBid && hasItem;
  const squadFull = actualCount >= sq.max;
  const cantFillSquad = budgetAfterBid < reserveNeeded;
  const disabled = !hasItem || cantAfford || squadFull || cantFillSquad || isLeader;
  let reason = '';
  if (squadFull) reason = 'Squad full';
  else if (cantAfford) reason = 'Not enough purse';
  else if (cantFillSquad) reason = 'Need reserve for squad';
  return { isLeader, actualCount, reserveNeeded, cantAfford, squadFull, cantFillSquad, disabled, reason, nextBid, max: sq.max };
}

const clone = (o) => JSON.parse(JSON.stringify(o));
const genCode = () => String(Math.floor(1000 + Math.random() * 9000));
const XI_SLOTS = 11;

  const out = emptyPlan();

    for (let i = 0; i < XI_SLOTS; i++) {
      const s = p.slots[i];
      if (Array.isArray(s)) out.slots[i] = s.filter(c => c && c.playerId != null).slice(0, 4);

  const teams = [...data.teams].sort((a, b) => (b.playerCount || 0) - (a.playerCount || 0) || (b.remaining || 0) - (a.remaining || 0));
  const totalSpent = (t) => (t.budget || 0) - (t.remaining || 0);

  const blocks = teams.map((t, idx) => {

    // squad progress bar (out of max)
    const blocksFilled = Math.round((filled / max) * 10);
    const bar = '▰'.repeat(blocksFilled) + '▱'.repeat(10 - blocksFilled);
    const header =
      `${medal} <b>${tgEsc(t.name)}</b>\n` +
      `   <code>${bar}</code> ${filled}/${max}\n` +
      `   💰 <b>${formatCr(t.remaining)}</b> left · spent ${formatCr(totalSpent(t))} · ${left} slots open`;
    if (filled === 0) return header + '\n   <i>No players yet</i>';
    const lines = bought.map(p =>
      `${roleIcon(p.role)} ${padEnd(p.name, 17)}${padStart(formatCr(p.soldPrice), 8)}`
    );
    return header + '\n<pre>' + tgEsc(lines.join('\n')) + '</pre>';
  });

  const totalSold = data.players.filter(p => p.status === 'sold').length;
  const totalValue = data.teams.reduce((s, t) => s + totalSpent(t), 0);

function tgText(tg, caption) {

}
function tgSend(tg, opts) {
  const base = 'https://api.telegram.org/bot' + tg.token + '/';
  let photo = opts.photo; const caption = opts.caption;

  const isUrl = typeof photo === 'string' && /^https?:\/\//i.test(photo);
  // If the photo can't be sent (unsupported format, unreachable), still deliver the details as text.
  const orText = (res) => (res && res.ok) ? res : tgText(tg, caption);
  if (isData) {
    const fd = new FormData();
    fd.append('chat_id', tg.chatId); fd.append('caption', caption); fd.append('parse_mode', 'HTML');
    fd.append('photo', dataURItoBlob(photo), 'player.jpg');
    return fetch(base + 'sendPhoto', { method: 'POST', body: fd }).then(r => r.json()).then(orText).catch(() => tgText(tg, caption));
  }
  if (isUrl) {
    const params = new URLSearchParams();
    params.set('chat_id', tg.chatId); params.set('parse_mode', 'HTML'); params.set('photo', tgPhotoFix(photo)); params.set('caption', caption);
    return fetch(base + 'sendPhoto', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() }).then(r => r.json()).then(orText).catch(() => tgText(tg, caption));
  }
  return tgText(tg, caption);
}

// Synthesized via WebAudio — no external files, works offline.
const Sound = (() => {
  let ctx = null;
  const ensure = () => { if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return ctx; };
  let on = false;
  const tone = (freq, dur, type = 'sine', vol = 0.2, slideTo = null) => {
    if (!on) return; const c = ensure(); if (!c) return;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c.currentTime + dur);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + dur);
  };
  const noise = (dur, vol = 0.25) => {
    if (!on) return; const c = ensure(); if (!c) return;
    const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = c.createBufferSource(); src.buffer = buf;
    const g = c.createGain(); g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
    src.connect(f); f.connect(g); g.connect(c.destination); src.start();
  };
  return {
    setOn(v) { on = v; if (v) ensure() && ctx.resume && ctx.resume(); },
    isOn() { return on; },
    bid() { tone(620, 0.08, 'triangle', 0.18); setTimeout(() => tone(880, 0.1, 'triangle', 0.16), 60); },
    spin() { tone(180, 0.5, 'sawtooth', 0.08, 90); },
    tickSpin() { tone(1200, 0.03, 'square', 0.06); },
    gavel() { tone(150, 0.12, 'square', 0.3, 60); setTimeout(() => noise(0.12, 0.2), 40); },
    sold() { this.gavel(); setTimeout(() => { tone(523, 0.5, 'sine', 0.2); tone(659, 0.5, 'sine', 0.18); tone(784, 0.6, 'sine', 0.16); noise(0.8, 0.18); }, 120); },
    unsold() { tone(300, 0.18, 'sawtooth', 0.16, 140); },
    nav() { tone(520, 0.05, 'sine', 0.08); },
  };
})();

/* ============================ ANIMATED NUMBER ============================ */
function useCountUp(target, deps, ms = 600) {
  const [val, setVal] = useState(target);
  const fromRef = useRef(target);
  useEffect(() => {
    const from = fromRef.current, to = target, start = performance.now();
    let raf;
    const step = (t) => {
      const p = Math.min(1, (t - start) / ms);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(from + (to - from) * eased);
      if (p < 1) raf = requestAnimationFrame(step); else fromRef.current = to;
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, deps); // eslint-disable-line
  return val;
}

            <input className="input" type="text" placeholder="-1001234567890" value={(s.telegram && s.telegram.chatId) || ''} onChange={e => setTg('chatId', e.target.value.trim())} /></label>
          <button className="btn btn-ghost btn-sm" onClick={testTg}>Send test message</button>
          <p className="hint">Create a bot with <b>@BotFather</b> → copy its token. Add the bot to your group. To get the group chat ID, add <b>@RawDataBot</b> to the group (it prints the chat id, a negative number), then remove it. Only the auctioneer's device sends, so there are no duplicates. The token sits inside this page — only share the auction link with people you trust.</p>
        </div>
      </div>

      <div className="grid" style={{ gap: 18 }}>
        {/* DATA TOOLS */}
        <div className="panel panel-pad">
          <div className="panel-head"><span className="eyebrow">Data</span><h2>Import & Export</h2></div>
          <div className="grid" style={{ gap: 9 }}>
            <button className="btn btn-ghost btn-block" onClick={() => excelRef.current.click()}>📤 Import Teams & Players (Excel)</button>
            <input ref={excelRef} type="file" accept=".xlsx,.xls" className="hidden-file" onChange={e => fileImportExcel(e.target)} />
            <button className="btn btn-ghost btn-block" onClick={sampleExcel}>📊 Download Sample Excel</button>
            <div className="divider" />
            <button className="btn btn-ghost btn-block" onClick={exportExcel}>📥 Export Everything (Excel)</button>
            <button className="btn btn-ghost btn-block" onClick={exportJSON}>💾 Backup (JSON)</button>
            <button className="btn btn-ghost btn-block" onClick={() => jsonRef.current.click()}>📂 Restore from Backup (JSON)</button>
            <input ref={jsonRef} type="file" accept=".json" className="hidden-file" onChange={e => importJSON(e.target)} />
            <div className="divider" />
            <button className="btn btn-ghost btn-block" onClick={() => mutate(d => { let n = 0; d.players.forEach(p => { if (p.status === 'unsold') { p.status = 'pending'; n++; } }); if (n === 0) toast('No unsold players to revive', 'info'); else toast(`${n} players returned to the pool`, 'ok'); })}>♻️ Revive Unsold Players</button>
            <button className="btn btn-danger btn-block" onClick={resetAll}>🗑️ Reset Entire Auction</button>
          </div>
        </div>

        {/* ADD TEAM */}
        <div className="panel panel-pad">
          <div className="panel-head"><span className="eyebrow">Roster</span><h2>Teams ({data.teams.length})</h2></div>
          <div className="field"><input className="input" placeholder="Team name" value={tName} onChange={e => setTName(e.target.value)} /></div>
          <div className="row" style={{ marginBottom: 10 }}>
            <input className="input" type="number" placeholder="Budget (Lakhs)" value={tBudget} onChange={e => setTBudget(e.target.value)} />
            <input className="input" placeholder="Logo URL (optional)" value={tLogo} onChange={e => setTLogo(e.target.value)} />
          </div>
          <button className="btn btn-gold btn-block" onClick={addTeam}>Add Team</button>
          {data.teams.length > 0 && (
            <div style={{ marginTop: 14, display: 'flex', flexDirection: 'column', gap: 6 }}>
              {data.teams.map(t => (
                <div key={t.id} className="row" style={{ justifyContent: 'space-between', padding: '8px 11px', borderRadius: 9, background: 'rgba(5,8,18,0.5)', border: '1px solid var(--line)', borderLeft: `3px solid ${teamColor(t.name)}` }}>
                  <span style={{ fontWeight: 600, fontSize: '0.9rem' }}>{t.name}</span>
                  <span className="row" style={{ gap: 8 }}>
                    {s.teamLoginEnabled && (
                      <span className="code-chip" title="Share this code with the team" onClick={() => mutate(d => { const tm = d.teams.find(x => x.id === t.id); tm.code = genCode(); }) }>
                        🔑 {t.code || '—'}
                      </span>
                    )}
                    <span style={{ fontFamily: 'var(--mono)', fontSize: '0.8rem', color: 'var(--money)' }}>{formatCr(t.budget)}</span>
                    <button className="btn btn-sm btn-danger" onClick={() => removeTeam(t.id)}>✕</button>
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ADD PLAYER */}
        <div className="panel panel-pad">
          <div className="panel-head"><span className="eyebrow">Pool</span><h2>Add Player</h2></div>
          <div className="field"><input className="input" placeholder="Player name" value={pName} onChange={e => setPName(e.target.value)} /></div>
          <div className="row" style={{ marginBottom: 10 }}>
            <select className="input" value={pRole} onChange={e => setPRole(e.target.value)}>{ROLES.map(r => <option key={r}>{r}</option>)}</select>
            <input className="input" type="number" placeholder="Base (L)" value={pPrice} onChange={e => setPPrice(e.target.value)} />
          </div>
          <div className="field"><input className="input" placeholder="Photo URL (optional)" value={pImg} onChange={e => setPImg(e.target.value)} /></div>
          <button className="btn btn-money btn-block" onClick={addPlayer}>Add Player</button>
          <p className="hint">{data.players.length} players in the pool · {data.players.filter(p => p.status === 'pending').length} pending</p>
        </div>
      </div>
    </div>
  );
}
/* ============================ AUCTION HELPERS ============================ */
function computePending(data) {
  const pending = data.players.filter(p => p.status === 'pending');
  const st = data.settings;
  if (st.setsEnabled) {
    let idx = data.state.currentSetIndex || 1;
    let pool = pending.filter(p => normalizeRole(p.role) === normalizeRole(st.sets[idx]));
    while (pool.length === 0 && idx < 4) { idx++; pool = pending.filter(p => normalizeRole(p.role) === normalizeRole(st.sets[idx])); }
    return { pool, nextSetIndex: idx, pendingTotal: pending.length };
  }
  return { pool: pending, nextSetIndex: data.state.currentSetIndex || 1, pendingTotal: pending.length };
}

/* ============================ SPIN REEL ============================ */
function SpinReel({ pool, chosen, onDone }) {
  const trackRef = useRef();
  const [items] = useState(() => {
    const arr = [];
    for (let i = 0; i < 26; i++) arr.push(pool[Math.floor(Math.random() * pool.length)]);
    arr.push(chosen); // final landing cell at index 26
    return arr;
  });
  useEffect(() => {
    Sound.spin();
    const tickT = setInterval(() => Sound.tickSpin(), 110);
    const el = trackRef.current;
    requestAnimationFrame(() => {
      el.style.transition = 'transform 2.8s cubic-bezier(0.12, 0.72, 0.13, 1)';
      el.style.transform = `translateY(${-(items.length - 1) * 320}px)`;
    });
    const land = setTimeout(() => { clearInterval(tickT); Sound.gavel(); onDone(); }, 2900);
    return () => { clearInterval(tickT); clearTimeout(land); };
  }, []); // eslint-disable-line
  return (
    <div className="spin-zone">
      <div className="reel-window">
        <div className="reel-line" />
        <div className="reel-track" ref={trackRef} style={{ transform: 'translateY(0)' }}>
          {items.map((p, i) => (
            <div className="reel-cell" key={i}>
              {p.img ? <img src={p.img} alt="" /> : <div className="ph">{(p.name || '?')[0]}</div>}
              <div className="nm">{p.name}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="spin-caption">Selecting…</div>
    </div>
  );
}

/* ============================ AUCTION VIEW ============================ */
function fmtStat(v, dec) {
  if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
  const n = Number(v);
  return dec ? String(Math.round(n * 100) / 100) : String(Math.round(n));
}
function hasStats(s) {
  return !!s && ['mat', 'runs', 'wkts', 'avg', 'sr', 'econ'].some(k => s[k] !== null && s[k] !== undefined && s[k] !== '');
}
function PlayerStats({ stats, compact }) {
  if (!hasStats(stats)) return null;
  const cells = [
    ['Matches', fmtStat(stats.mat, 0)],
    ['Runs', fmtStat(stats.runs, 0)],
    ['Wickets', fmtStat(stats.wkts, 0)],
    ['Bat Avg', fmtStat(stats.avg, 1)],
    ['Strike Rate', fmtStat(stats.sr, 1)],
    ['Economy', fmtStat(stats.econ, 1)],
  ];
  return (
    <div className={'statcard' + (compact ? ' compact' : '')}>
      {cells.map(([l, v]) => <div key={l} className="stat"><span className="sv">{v}</span><span className="sl">{l}</span></div>)}
    </div>
  );
}

function AuctionView({ data, mutate, isAdmin, toast, openManualSell, openEditUnused, myTeamId, teamLoginEnabled }) {
  const st = data.state;
  const [spinning, setSpinning] = useState(false);
  const [chosen, setChosen] = useState(null);
  const [flash, setFlash] = useState(0);
  const [bump, setBump] = useState(0);
  const prevBid = useRef(st.currentBid);
  const animBid = useCountUp(st.currentBid, [st.currentBid, st.currentItem?.id]);

  useEffect(() => {
    if (st.currentBid !== prevBid.current) { setBump(b => b + 1); prevBid.current = st.currentBid; }
  }, [st.currentBid]);

  const start = () => mutate(d => {
    if (d.teams.length === 0) { toast('Add at least one team first', 'warn'); return; }
    d.state.auctionStarted = true; d.state.currentSetIndex = 1;
    const { pool, nextSetIndex } = computePending(d);
    d.state.currentSetIndex = nextSetIndex; d.state.pendingPool = pool;
    d.state.currentItem = null; d.state.currentBid = 0; d.state.currentBidder = null; d.state.bidHistory = [];
  });

  const toSpinReady = () => mutate(d => {
    const { pool, nextSetIndex } = computePending(d);
    d.state.currentSetIndex = nextSetIndex; d.state.pendingPool = pool;
    d.state.currentItem = null; d.state.currentBid = 0; d.state.currentBidder = null; d.state.bidHistory = [];
  });

  const doSpin = () => {
    const pool = (st.pendingPool && st.pendingPool.length) ? st.pendingPool : data.players.filter(p => p.status === 'pending');
    if (!pool.length) { toast('No players left in this set', 'info'); return; }
    let pick = pool[Math.floor(Math.random() * pool.length)];
    if (pool.length > 1 && st.lastSkippedId === pick.id) pick = pool[(pool.indexOf(pick) + 1) % pool.length];
    setChosen(pick); setSpinning(true);
  };

  const finishSpin = () => {
    setSpinning(false);
    mutate(d => {
      d.state.currentItem = chosen; d.state.currentBid = chosen.basePrice; d.state.currentBidder = null;
      d.state.bidHistory = []; d.state.lastSkippedId = null;
    });
  };

  const placeBid = (teamId) => {
    if (!isAdmin) return toast('Only the auctioneer places bids', 'warn');
    if (!st.currentItem) return toast('Spin for a player first', 'warn');
    const team = data.teams.find(t => String(t.id) === String(teamId)); if (!team) return;
    const inc = getDynamicIncrement(st.currentBid, data.settings);
    const newBid = st.currentBidder ? st.currentBid + inc : st.currentBid;
    if (team.remaining < newBid) return toast(`${team.name} can't cover ${formatCr(newBid)}`, 'warn');
    Sound.bid();
    setFlash(f => f + 1);
    mutate(d => {
      d.state.bidHistory.push({ bid: d.state.currentBid, bidder: d.state.currentBidder });
      d.state.currentBid = newBid; d.state.currentBidder = teamId;
    });
  };

  const undoBid = () => {
    if (!st.bidHistory || st.bidHistory.length === 0) return toast('Nothing to undo', 'info');
    mutate(d => { const last = d.state.bidHistory.pop(); d.state.currentBid = last.bid; d.state.currentBidder = last.bidder; });
  };

  const sell = () => {
    if (!isAdmin) return toast('Unlock admin first', 'warn');
    if (!st.currentBidder) return toast('No team is holding a bid', 'warn');
    const p = st.currentItem; const team = data.teams.find(t => t.id === st.currentBidder);
    finalizeSale(p, team, st.currentBid);
  };

  const finalizeSale = (p, team, price) => {
    Sound.sold();
    const remainingAfter = (team.remaining || 0) - price;
    let soldCountAfter = 0, snapAfter = null;
    mutate(d => {
      const rp = d.players.find(x => x.id === p.id);
      if (rp) { rp.status = 'sold'; rp.soldTo = team.name; rp.soldPrice = price; }
      const tm = d.teams.find(t => t.id === team.id);
      tm.remaining -= price; tm.playerCount = (tm.playerCount || 0) + 1; tm.players.push(p.id);
      d.state.lastSale = { playerId: p.id, name: p.name, role: p.role, img: p.img, team: team.name, teamLogo: team.logo || '', price, ts: Date.now() };
      d.state.currentItem = null; d.state.currentBid = 0; d.state.currentBidder = null; d.state.bidHistory = [];
      const { pool, nextSetIndex } = computePending(d);
      d.state.currentSetIndex = nextSetIndex; d.state.pendingPool = pool;
      soldCountAfter = d.players.filter(x => x.status === 'sold').length;
      snapAfter = clone(d);
    });
    // Push a SOLD card to Telegram (admin device only — viewers/teams never sell)
    const tg = data.settings.telegram;
    if (tg && tg.enabled && tg.token && tg.chatId) {
      const cap = `🔨 <b>SOLD</b>\n\n🏏 <b>${p.name}</b> · ${p.role}\n💰 <b>${formatCr(price)}</b>\n🛡 ${team.name}\n\n${team.name} purse left: <b>${formatCr(remainingAfter)}</b>`;
      tgSend(tg, { photo: p.img, caption: cap }).catch(e => console.error('telegram', e));
      // Every 4 sales, post the full team-sheet standings.
      if (soldCountAfter > 0 && soldCountAfter % 4 === 0 && snapAfter) {
        setTimeout(() => tgSend(tg, { photo: '', caption: buildStandings(snapAfter, soldCountAfter) }).catch(e => console.error('telegram', e)), 900);
      }
    }
  };

  const skip = () => {
    if (!st.currentItem) return;
    mutate(d => {
      d.state.lastSkippedId = d.state.currentItem.id;
      const idx = d.players.findIndex(x => x.id === d.state.currentItem.id);
      if (idx > -1) { const rp = d.players.splice(idx, 1)[0]; d.players.push(rp); }
      d.state.currentItem = null;
      const { pool, nextSetIndex } = computePending(d);
      d.state.currentSetIndex = nextSetIndex; d.state.pendingPool = pool;
    });
  };

  const unsold = () => {
    if (!st.currentItem) return; Sound.unsold();
    mutate(d => {
      const rp = d.players.find(x => x.id === d.state.currentItem.id); if (rp) rp.status = 'unsold';
      d.state.currentItem = null;
      const { pool, nextSetIndex } = computePending(d);
      d.state.currentSetIndex = nextSetIndex; d.state.pendingPool = pool;
    });
  };

  // expose handlers for keyboard layer
  AuctionView._handlers = { placeBid, sell, skip, unsold, doSpin, undoBid, spinning, hasItem: !!st.currentItem, isReady: st.auctionStarted && !st.currentItem };

  const inc = getDynamicIncrement(st.currentBid, data.settings);
  const leader = data.teams.find(t => t.id === st.currentBidder);
  const item = st.currentItem;
  const pendingCount = data.players.filter(p => p.status === 'pending').length;
  const soldCount = data.players.filter(p => p.status === 'sold').length;

  if (!st.auctionStarted) {
    return (
      <div className="section-fade panel stage-empty">
        <span className="eyebrow">Ready when you are</span>
        <div className="big">THE AUCTION AWAITS</div>
        <p style={{ color: 'var(--muted)', maxWidth: 420 }}>
          {data.teams.length} teams · {pendingCount} players in the pool ·{' '}
          {data.settings.setsEnabled ? `Sets on (starts with ${data.settings.sets[1]})` : 'Random order'}
        </p>
        {isAdmin
          ? <button className="btn btn-gold" style={{ fontSize: '1.1rem', padding: '14px 40px' }} onClick={start} disabled={data.teams.length === 0}>🔨 Start Auction</button>
          : <span className="pill pill-gold">Waiting for the auctioneer to begin</span>}
      </div>
    );
  }

  return (
    <div className="section-fade arena">
      {/* STAGE */}
      <div className="stage">
        <div className="stage-spot" /><div className="stage-floor" />
        {spinning && chosen ? (
          <SpinReel pool={st.pendingPool && st.pendingPool.length ? st.pendingPool : data.players.filter(p => p.status === 'pending')} chosen={chosen} onDone={finishSpin} />
        ) : item ? (<>
          <div className="stage-photo-wrap">
            <div className="stage-jersey">#{soldCount + 1}</div>
            {item.img ? <img key={item.id} className="stage-photo in" src={item.img} alt={item.name} /> : <div className="stage-placeholder">{(item.name || '?')[0]}</div>}
          </div>
          <div className="stage-meta">
            <div className="stage-role">{item.role}</div>
            <div className="stage-name">{item.name}</div>
            <div className="stage-base">Base price <b>{formatCr(item.basePrice)}</b></div>
            <PlayerStats stats={item.stats} />
          </div>
          {isAdmin && (
            <div className="stage-controls admin-only">
              <button className="btn btn-ghost btn-sm" onClick={skip}>⏭ Skip</button>
              <button className="btn btn-sm" style={{ color: 'var(--danger)', borderColor: 'rgba(251,94,94,0.4)' }} onClick={unsold}>Mark Unsold</button>
            </div>
          )}
        </>) : (
          <div className="spin-zone">
            <div className="stage-placeholder" style={{ fontSize: '4rem' }}>🎲</div>
            <div className="stage-role" style={{ marginTop: 6 }}>{data.settings.setsEnabled ? `Set ${st.currentSetIndex}: ${data.settings.sets[st.currentSetIndex]}` : 'Any role'}</div>
            {isAdmin ? (
              pendingCount > 0
                ? <button className="btn btn-gold admin-only" style={{ fontSize: '1.05rem', padding: '13px 32px' }} onClick={doSpin}>🎰 Spin for Player</button>
                : <div style={{ textAlign: 'center' }}><div className="big" style={{ fontFamily: 'var(--display)', fontSize: '1.8rem', color: 'var(--gold)' }}>AUCTION COMPLETE</div><p className="hint">All players have been processed.</p></div>
            ) : <span className="pill pill-live">Waiting for the next spin…</span>}
          </div>
        )}
      </div>

      {/* BOARD */}
      <div className="board">
        <div className={'bid-now' + (flash ? ' flash' : '')} key={flash} style={leader ? { '--flash-color': `color-mix(in srgb, ${teamColor(leader.name)} 55%, transparent)`, borderColor: teamColor(leader.name) } : {}}>
          <div className="corner"><div className="inc-lbl">Next jump</div><div className="inc-val">+{formatCr(inc)}</div></div>
          <div className="lbl">Current Bid</div>
          <div className={'amt' + (bump ? ' bump' : '')} key={bump}>{item ? formatCr(Math.round(animBid)) : '—'}</div>
          <div className="who">{leader ? <>Held by <b style={{ color: teamColor(leader.name) }}>{leader.name}</b></> : (item ? 'No bids yet — opening at base' : 'Spin to bring up a player')}</div>
        </div>

        <div className="history">
          <h4>Bid History</h4>
          <div className="history-list">
            {st.bidHistory && st.bidHistory.length > 0 ? (
              [...st.bidHistory].reverse().map((h, i, arr) => {
                const tIdx = arr.length - i; const t = data.teams.find(x => x.id === (arr[i - 1] ? arr[i - 1].bidder : st.currentBidder));
                return null;
              })
            ) : null}
            {item && st.bidHistory && st.bidHistory.length > 0
              ? renderBidHistory(st, data)
              : <div className="h-empty">No bids yet</div>}
          </div>
        </div>

        <div className="countbar" style={{ marginTop: 4 }}>
          <span className="pill pill-live">{pendingCount} left in pool</span>
          {isAdmin && <button className="btn btn-ghost btn-sm admin-only" onClick={undoBid}>↩ Undo last bid</button>}
        </div>

        {/* PADDLES */}
        <div className="paddles">
          <h3 className="form-label" style={{ margin: '4px 0 8px' }}>Bidding Teams {isAdmin && <span className="hint" style={{ display: 'inline' }}>· press 1–9 to bid</span>}</h3>
          <div className="paddle-grid">
            {data.teams.map((t, i) => {
              const ps = paddleState(t, data); const col = teamColor(t.name);
              return (
                <button key={t.id} className={'paddle' + (ps.isLeader ? ' leader' : '')} style={{ '--team': col }} disabled={!isAdmin || ps.disabled} onClick={() => placeBid(t.id)}>
                  {ps.isLeader && <span className="crown">👑</span>}
                  {isAdmin && i < 9 && <span className="kbd">{i + 1}</span>}
                  <div className="pn"><span className="dot" />{t.name}</div>
                  <div className="sub">{formatCr(t.remaining)} left</div>
                  <div className="sub2">Squad {ps.actualCount}/{ps.max}</div>
                  {ps.squadFull ? <div className="warn-tag" style={{ color: 'var(--danger)' }}>Squad full</div>
                    : ps.cantAfford ? <div className="warn-tag" style={{ color: 'var(--danger)' }}>Low purse</div>
                    : ps.cantFillSquad ? <div className="warn-tag" style={{ color: 'var(--warn)' }}>⚠ Reserve {formatCr(ps.reserveNeeded)}</div>
                    : null}
                </button>
              );
            })}
          </div>
        </div>

        {isAdmin && (
          <div className="action-bar admin-only">
            <button className="btn btn-sold" onClick={sell} disabled={!st.currentBidder}><span className="gv">🔨</span>SOLD</button>
            <button className="btn btn-warn btn-mansell" onClick={() => openManualSell(item, finalizeSale)} disabled={!item}>⚡ Manual Sell</button>
          </div>
        )}
      </div>
    </div>
  );
}

function renderBidHistory(st, data) {
  // Reconstruct each bid step: history holds prior states; show the climb
  const rows = [];
  const hist = st.bidHistory;
  for (let i = 0; i < hist.length; i++) {
    const bidAtStep = (i + 1 < hist.length) ? hist[i + 1].bid : st.currentBid;
    const bidderAtStep = (i + 1 < hist.length) ? hist[i + 1].bidder : st.currentBidder;
    const t = data.teams.find(x => x.id === bidderAtStep);
    if (t) rows.push({ name: t.name, bid: bidAtStep, col: teamColor(t.name), key: i });
  }
  return rows.reverse().map(r => (
    <div className="h-row" key={r.key}>
      <span className="t" style={{ color: r.col }}>{r.name}</span>
      <span className="v">{formatCr(r.bid)}</span>
    </div>
  ));
}
/* ============================ TEAMS VIEW ============================ */
function TeamsView({ data, exportSquads }) {
  const sq = data.settings.squadRules || { min: 11, max: 15 };
  if (data.teams.length === 0) return <div className="panel panel-pad empty-note section-fade">No teams yet. Add teams in Setup to see squads here.</div>;
  return (
    <div className="section-fade">
      <div className="row" style={{ justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <h3 className="form-label" style={{ margin: 0 }}>Squads · {data.teams.length} teams</h3>
        <button className="btn btn-gold btn-sm" onClick={exportSquads}>⬇ Export Squad Sheets (Excel)</button>
      </div>
      <div className="grid g-2">
      {data.teams.map(t => {
        const col = teamColor(t.name);
        const roster = data.players.filter(p => p.soldTo === t.name && p.status === 'sold');
        const pending = Math.max(0, sq.min - roster.length);
        return (
          <div className="team-card" key={t.id} style={{ '--team': col }}>
            <div className="team-card-head">
              {t.logo ? <img className="team-logo" src={t.logo} alt="" /> : <div className="team-logo-ph">{initials(t.name)}</div>}
              <div>
                <div className="nm">{t.name}</div>
                <div style={{ display: 'flex', gap: 8, marginTop: 5 }}>
                  <span className="pill pill-live" style={{ fontSize: '0.62rem' }}>{roster.length} signed</span>
                  {pending > 0 ? <span className="pill pill-warn" style={{ fontSize: '0.62rem' }}>{pending} to go</span> : <span className="pill pill-money" style={{ fontSize: '0.62rem' }}>min met</span>}
                </div>
              </div>
              <div className="purse"><div className="v">{formatCr(t.remaining)}</div><div className="l">purse left</div></div>
            </div>
            <div className="team-roster">
              {roster.length ? roster.map(p => (
                <div className="roster-row" key={p.id} style={{ '--team': col }}>
                  {p.img ? <img src={p.img} alt="" /> : <div className="ph">{(p.name || '?')[0]}</div>}
                  <div><div className="rn">{p.name}</div><div className="rr">{p.role}</div></div>
                  <div className="rp">{formatCr(p.soldPrice)}</div>
                </div>
              )) : <div className="roster-empty">No players signed yet</div>}
            </div>
          </div>
        );
      })}
      </div>
    </div>
  );
}

/* ============================ DASHBOARD VIEW ============================ */
function DashboardView({ data }) {
  const sold = data.players.filter(p => p.status === 'sold');
  const unsold = data.players.filter(p => p.status === 'unsold').length;
  const spent = data.teams.reduce((a, t) => a + (t.budget - t.remaining), 0);
  const priciest = sold.slice().sort((a, b) => b.soldPrice - a.soldPrice)[0];
  const sq = data.settings.squadRules || { min: 11, max: 15 };
  return (
    <div className="section-fade grid" style={{ gap: 18 }}>
      <div className="grid g-4">
        <div className="stat-tile"><span className="ic">👥</span><div className="k">Teams</div><div className="v">{data.teams.length}</div></div>
        <div className="stat-tile"><span className="ic">✅</span><div className="k">Players Sold</div><div className="v" style={{ color: 'var(--money)' }}>{sold.length}</div></div>
        <div className="stat-tile"><span className="ic">💰</span><div className="k">Total Spent</div><div className="v" style={{ color: 'var(--gold)' }}>{formatCr(spent)}</div></div>
        <div className="stat-tile"><span className="ic">🚫</span><div className="k">Unsold</div><div className="v" style={{ color: 'var(--danger)' }}>{unsold}</div></div>
      </div>

      {priciest && (
        <div className="panel panel-pad" style={{ display: 'flex', alignItems: 'center', gap: 16, borderLeft: `3px solid ${teamColor(priciest.soldTo)}` }}>
          <span style={{ fontSize: '1.8rem' }}>🏆</span>
          <div style={{ flex: 1 }}><div className="eyebrow">Marquee buy</div><div style={{ fontFamily: 'var(--head)', fontWeight: 700, fontSize: '1.2rem' }}>{priciest.name} <span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: '0.9rem' }}>→ {priciest.soldTo}</span></div></div>
          <div style={{ fontFamily: 'var(--display)', fontSize: '2.2rem', color: teamColor(priciest.soldTo) }}>{formatCr(priciest.soldPrice)}</div>
        </div>
      )}

      {data.teams.length === 0 ? <div className="panel panel-pad empty-note">Add teams to populate the dashboard.</div> : (
        <div className="grid g-4">
          {data.teams.map(t => {
            const col = teamColor(t.name);
            const cnt = data.players.filter(p => p.soldTo === t.name && p.status === 'sold').length;
            const pending = Math.max(0, sq.min - cnt);
            const pct = t.budget > 0 ? ((t.budget - t.remaining) / t.budget) * 100 : 0;
            return (
              <div className="team-card" key={t.id} style={{ '--team': col }}>
                <div style={{ padding: '20px 18px', textAlign: 'center' }}>
                  {t.logo ? <img className="team-logo" style={{ width: 64, height: 64, margin: '0 auto 8px' }} src={t.logo} alt="" /> : <div className="team-logo-ph" style={{ width: 64, height: 64, margin: '0 auto 8px', fontSize: '1.6rem' }}>{initials(t.name)}</div>}
                  <div style={{ fontFamily: 'var(--head)', fontWeight: 700, fontSize: '1.15rem' }}>{t.name}</div>
                  <div style={{ marginTop: 6 }}>{pending > 0 ? <span className="pill pill-warn" style={{ fontSize: '0.62rem' }}>{pending} pending</span> : <span className="pill pill-money" style={{ fontSize: '0.62rem' }}>min met</span>}</div>
                  <div className="progress"><div style={{ width: pct + '%' }} /></div>
                  <div className="sub-stat">
                    <div className="c"><div className="l">Left</div><div className="v" style={{ color: 'var(--money)' }}>{formatCr(t.remaining)}</div></div>
                    <div className="c"><div className="l">Spent</div><div className="v" style={{ color: 'var(--danger)' }}>{formatCr(t.budget - t.remaining)}</div></div>
                    <div className="c"><div className="l">Signed</div><div className="v">{cnt}</div></div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ============================ PLAYERS VIEW ============================ */
function PlayersView({ data, mutate, isAdmin, toast, openPreAssign, openEditSale }) {
  const [filter, setFilter] = useState('all');
  const [q, setQ] = useState('');
  const imgRef = useRef(); const editId = useRef(null);
  const list = data.players.filter(p => (filter === 'all' || p.status === filter) && p.name.toLowerCase().includes(q.toLowerCase()));

    if (!input.files || !input.files[0]) return;
    const r = new FileReader();
    r.onload = (e) => {
      const b64 = e.target.result;
      if (b64.length > 700000 && !confirm('Large image (>0.7MB) may bump the cloud size limit. Continue?')) { input.value = ''; return; }
      mutate(d => { const p = d.players.find(x => x.id === editId.current); if (p) p.img = b64; });
      toast('Photo updated', 'ok');
    };
    r.readAsDataURL(input.files[0]); input.value = '';
  };

  return (
    <div className="section-fade panel" style={{ overflow: 'hidden' }}>

          <tbody>
            {list.length === 0 ? <tr><td colSpan={isAdmin ? 7 : 6} className="empty-note">No players match.</td></tr> :

                  <td>{p.role}</td>
                  <td style={{ fontFamily: 'var(--mono)' }}>{formatCr(p.basePrice)}</td>
                  <td><span className={'status-badge ' + (p.status === 'sold' ? 'st-sold' : p.status === 'unsold' ? 'st-unsold' : 'st-pending')}>{p.status}</span></td>

                  {isAdmin && (
                    <td>
                      <div className="row" style={{ gap: 6, flexWrap: 'wrap' }}>
                        <button className="btn btn-sm btn-ghost" onClick={() => { editId.current = p.id; imgRef.current.click(); }}>📷</button>
                        {(p.status === 'pending' || p.status === 'unsold') && <button className="btn btn-sm btn-warn" onClick={() => openPreAssign(p)}>⭐ Assign</button>}
                        {p.status === 'sold' && <button className="btn btn-sm btn-ghost" style={{ color: 'var(--live)', borderColor: 'rgba(34,211,238,0.4)' }} onClick={() => openEditSale(p)}>✏️ Edit</button>}
                      </div>
                    </td>

                </tr>
              ))}

      <input ref={imgRef} type="file" accept="image/*" className="hidden-file" onChange={e => onPic(e.target)} />
    </div>
  );
}

/* ============================ TEAM AGGREGATE RECOMPUTE ============================ */
// Source of truth = players[]. Rebuild each team's remaining/playerCount/players from sold rows.
function recomputeTeams(d) {
  d.teams.forEach(t => {
    const owned = d.players.filter(p => p.status === 'sold' && p.soldTo === t.name);
    t.players = owned.map(p => p.id);
    t.playerCount = owned.length;
    t.remaining = (t.budget || 0) - owned.reduce((s, p) => s + (p.soldPrice || 0), 0);
  });
}

/* ============================ MODALS ============================ */
function ModalShell({ title, sub, children, onClose }) {
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  }, []);
  return (
    <div className="modal-bg" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <h2>{title}</h2>
        {sub && <div className="sub">{sub}</div>}
        {children}
      </div>
    </div>
  );
}

function AdminPinModal({ onClose, onPass, toast }) {
  const [pin, setPin] = useState('');
  const ref = useRef(null);
  useEffect(() => { setTimeout(() => ref.current && ref.current.focus(), 60); }, []);
  const submit = () => {
    if (pin === '1111') { onPass(); }
    else { toast('Wrong PIN', 'warn'); setPin(''); }
  };
  return (
    <ModalShell title="Auctioneer access" sub="Enter the 4-digit PIN to unlock admin controls." onClose={onClose}>
      <div className="field">
        <input ref={ref} className="input pin-input" type="password" inputMode="numeric" maxLength={4}
          value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, ''))}
          onKeyDown={e => e.key === 'Enter' && submit()} placeholder="••••" />
      </div>
      <div className="modal-actions">
        <button className="btn btn-gold btn-block" onClick={submit}>Unlock</button>
        <button className="btn btn-ghost btn-block" onClick={onClose}>Cancel</button>
      </div>
    </ModalShell>
  );
}

// Unified login: auctioneer (PIN) or — when enabled — a team (name + code)
function LoginModal({ data, onAdmin, onTeam, onClose, toast }) {
  const teamsOn = !!data.settings.teamLoginEnabled;
  const [mode, setMode] = useState(teamsOn ? 'choose' : 'admin');
  const [pin, setPin] = useState('');
  const [teamId, setTeamId] = useState('');
  const [code, setCode] = useState('');
  const pinRef = useRef(null);
  useEffect(() => { if (mode === 'admin') setTimeout(() => pinRef.current && pinRef.current.focus(), 60); }, [mode]);

  const submitAdmin = () => { if (pin === '1111') onAdmin(); else { toast('Wrong PIN', 'warn'); setPin(''); } };
  const submitTeam = () => {
    const team = data.teams.find(t => String(t.id) === String(teamId));
    if (!team) return toast('Pick your team', 'warn');
    if (String(team.code || '') !== code.trim()) return toast('That code does not match', 'warn');
    onTeam(team.id, team.name);
  };

  return (
    <ModalShell title="Join the auction" sub={teamsOn ? 'Log in as the auctioneer or as your team.' : 'Enter the auctioneer PIN to control the auction.'} onClose={onClose}>
      {teamsOn && mode === 'choose' && (
        <div className="modal-actions">
          <button className="btn btn-gold btn-block" onClick={() => setMode('admin')}>🔨 I'm the auctioneer</button>
          <button className="btn btn-block" style={{ borderColor: 'rgba(34,211,238,0.4)', color: 'var(--live)' }} onClick={() => setMode('team')}>👥 I'm a team</button>
          <button className="btn btn-ghost btn-block" onClick={onClose}>Cancel</button>
        </div>
      )}
      {mode === 'admin' && (<>
        <div className="field">
          <input ref={pinRef} className="input pin-input" type="password" inputMode="numeric" maxLength={4}
            value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, ''))}
            onKeyDown={e => e.key === 'Enter' && submitAdmin()} placeholder="••••" />
        </div>
        <div className="modal-actions">
          <button className="btn btn-gold btn-block" onClick={submitAdmin}>Unlock</button>
          <button className="btn btn-ghost btn-block" onClick={() => teamsOn ? setMode('choose') : onClose()}>{teamsOn ? 'Back' : 'Cancel'}</button>
        </div>
      </>)}
      {mode === 'team' && (<>
        <label className="field">
          <label>Your team</label>
          <select className="input" value={teamId} onChange={e => setTeamId(e.target.value)}>
            <option value="">— Select team —</option>
            {data.teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </label>
        <label className="field">
          <label>Access code</label>
          <input className="input pin-input" type="text" inputMode="numeric" maxLength={4}
            value={code} onChange={e => setCode(e.target.value.replace(/\D/g, ''))}
            onKeyDown={e => e.key === 'Enter' && submitTeam()} placeholder="••••" />
        </label>
        <div className="modal-actions">
          <button className="btn btn-block" style={{ background: 'var(--live)', color: '#04222a', fontWeight: 800 }} onClick={submitTeam}>Enter the room</button>
          <button className="btn btn-ghost btn-block" onClick={() => setMode('choose')}>Back</button>
        </div>
      </>)}
    </ModalShell>
  );
}

// Share / join: QR code + link to this auction (everyone lands in live read-only view)
function ShareModal({ onClose, toast }) {
  const boxRef = useRef(null);
  const url = window.location.href.split('#')[0];
  const isLocal = window.location.protocol === 'file:';
  useEffect(() => {
    if (isLocal || !window.QRCode || !boxRef.current) return;
    boxRef.current.innerHTML = '';
    try {
      new window.QRCode(boxRef.current, {
        text: url, width: 220, height: 220,
        colorDark: '#05070f', colorLight: '#ffffff',
        correctLevel: window.QRCode.CorrectLevel.M,
      });
    } catch (e) { console.error('QR error', e); }
  }, []);
  const copy = () => {
    try { navigator.clipboard.writeText(url); toast('Link copied', 'ok'); }
    catch (e) { toast('Copy not available — long-press the link', 'info'); }
  };
  return (
    <ModalShell title="Share the live auction" sub="Anyone who scans or opens this link joins the live view on their own device — players, bids, sales and purses all update in real time." onClose={onClose}>
      <div style={{ display: 'grid', placeItems: 'center', gap: 14 }}>
        {isLocal ? (
          <div className="empty-note" style={{ padding: 18, textAlign: 'center' }}>

          </div>

          <div ref={boxRef} style={{ background: '#fff', padding: 12, borderRadius: 16, boxShadow: '0 16px 40px -16px #000', lineHeight: 0 }} />

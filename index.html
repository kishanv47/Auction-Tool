function PricePicker({ teams, teamId, setTeamId, amount, setAmount, unit, setUnit }) {
  return (<>
    <label className="field">
      <label>Team</label>
      <select className="input" value={teamId} onChange={e => setTeamId(e.target.value)}>
        <option value="">— Select team —</option>
        {teams.map(t => <option key={t.id} value={t.id}>{t.name} · {formatCr(t.remaining)} left</option>)}
      </select>
    </label>
    <div className="row" style={{ gap: 10, alignItems: 'flex-end' }}>
      <label className="field" style={{ flex: 1, marginBottom: 0 }}>
        <label>Price</label>
        <input className="input" type="number" min="0" step="any" value={amount}
          onChange={e => setAmount(e.target.value)} placeholder="0" />
      </label>
      <label className="field" style={{ width: 110, marginBottom: 0 }}>
        <label>Unit</label>
        <select className="input" value={unit} onChange={e => setUnit(e.target.value)}>
          <option value="L">Lakh</option>
          <option value="Cr">Crore</option>
        </select>
      </label>
    </div>
  </>);
}
const toLakhs = (amount, unit) => Math.round((parseFloat(amount) || 0) * (unit === 'Cr' ? 100 : 1));

function ManualSellModal({ item, finalize, data, onClose, toast }) {
  const [teamId, setTeamId] = useState('');
  const [amount, setAmount] = useState(item ? String(item.basePrice >= 100 ? item.basePrice / 100 : item.basePrice) : '');
  const [unit, setUnit] = useState(item && item.basePrice >= 100 ? 'Cr' : 'L');
  const confirm = () => {
    const team = data.teams.find(t => String(t.id) === String(teamId));
    if (!team) return toast('Pick a team', 'warn');
    const price = toLakhs(amount, unit);
    if (price <= 0) return toast('Enter a valid price', 'warn');
    if (team.remaining < price) return toast(`${team.name} only has ${formatCr(team.remaining)}`, 'warn');
    finalize(item, team, price);
    onClose();
  };
  return (
    <ModalShell title="Manual sell" sub={`Sell ${item ? item.name : 'player'} at a custom price to any team.`} onClose={onClose}>
      <PricePicker teams={data.teams} teamId={teamId} setTeamId={setTeamId} amount={amount} setAmount={setAmount} unit={unit} setUnit={setUnit} />
      <div className="modal-actions">
        <button className="btn btn-money btn-block" onClick={confirm}>🔨 Confirm Sale</button>
        <button className="btn btn-ghost btn-block" onClick={onClose}>Cancel</button>
      </div>
    </ModalShell>
  );
}

function AssignModal({ player, data, mutate, onClose, toast }) {
  const [teamId, setTeamId] = useState('');
  const [amount, setAmount] = useState(String(player.basePrice >= 100 ? player.basePrice / 100 : player.basePrice));
  const [unit, setUnit] = useState(player.basePrice >= 100 ? 'Cr' : 'L');
  const confirm = () => {
    const team = data.teams.find(t => String(t.id) === String(teamId));
    if (!team) return toast('Pick a team', 'warn');
    const price = toLakhs(amount, unit);
    if (price <= 0) return toast('Enter a valid price', 'warn');
    if (team.remaining < price) return toast(`${team.name} only has ${formatCr(team.remaining)}`, 'warn');
    mutate(d => {
      const rp = d.players.find(x => x.id === player.id);
      if (rp) { rp.status = 'sold'; rp.soldTo = team.name; rp.soldPrice = price; }
      recomputeTeams(d);
    });
    toast(`${player.name} assigned to ${team.name}`, 'ok');
    onClose();
  };
  return (
    <ModalShell title="Pre-assign player" sub={`Place ${player.name} directly into a squad.`} onClose={onClose}>
      <PricePicker teams={data.teams} teamId={teamId} setTeamId={setTeamId} amount={amount} setAmount={setAmount} unit={unit} setUnit={setUnit} />
      <div className="modal-actions">
        <button className="btn btn-warn btn-block" onClick={confirm}>⭐ Assign to squad</button>
        <button className="btn btn-ghost btn-block" onClick={onClose}>Cancel</button>
      </div>
    </ModalShell>
  );
}

function EditSaleModal({ player, data, mutate, onClose, toast }) {
  const cur = data.teams.find(t => t.name === player.soldTo);
  const [teamId, setTeamId] = useState(cur ? String(cur.id) : '');
  const [amount, setAmount] = useState(String(player.soldPrice >= 100 ? player.soldPrice / 100 : player.soldPrice));
  const [unit, setUnit] = useState(player.soldPrice >= 100 ? 'Cr' : 'L');
  const save = () => {
    const team = data.teams.find(t => String(t.id) === String(teamId));
    if (!team) return toast('Pick a team', 'warn');
    const price = toLakhs(amount, unit);
    if (price <= 0) return toast('Enter a valid price', 'warn');
    // Validate against the team's budget after reversing this player's own contribution
    const otherSpend = data.players.filter(p => p.status === 'sold' && p.soldTo === team.name && p.id !== player.id)
      .reduce((s, p) => s + (p.soldPrice || 0), 0);
    if (team.budget - otherSpend < price) return toast(`${team.name} can't cover that — only ${formatCr(team.budget - otherSpend)} free`, 'warn');
    mutate(d => {
      const rp = d.players.find(x => x.id === player.id);
      if (rp) { rp.status = 'sold'; rp.soldTo = team.name; rp.soldPrice = price; }
      recomputeTeams(d);
    });
    toast('Sale updated', 'ok');
    onClose();
  };
  const revert = () => {
    mutate(d => {
      const rp = d.players.find(x => x.id === player.id);
      if (rp) { rp.status = 'unsold'; rp.soldTo = null; rp.soldPrice = 0; }
      recomputeTeams(d);
    });
    toast(`${player.name} returned to unsold`, 'info');
    onClose();
  };
  return (
    <ModalShell title="Edit sale" sub={`Currently ${player.soldTo} · ${formatCr(player.soldPrice)}. Change team or price and budgets auto-correct.`} onClose={onClose}>
      <PricePicker teams={data.teams} teamId={teamId} setTeamId={setTeamId} amount={amount} setAmount={setAmount} unit={unit} setUnit={setUnit} />
      <div className="modal-actions">
        <button className="btn btn-gold btn-block" onClick={save}>Save changes</button>
        <button className="btn btn-block" style={{ color: 'var(--danger)', borderColor: 'rgba(251,94,94,0.4)' }} onClick={revert}>↩ Revert to unsold</button>
        <button className="btn btn-ghost btn-block" onClick={onClose}>Cancel</button>
      </div>
    </ModalShell>
  );
}

function ConfirmModal({ title, sub, confirmLabel, danger, onConfirm, onClose }) {
  return (
    <ModalShell title={title} sub={sub} onClose={onClose}>
      <div className="modal-actions">
        <button className={'btn btn-block ' + (danger ? 'btn-danger' : 'btn-gold')} onClick={() => { onConfirm(); onClose(); }}>{confirmLabel || 'Confirm'}</button>
        <button className="btn btn-ghost btn-block" onClick={onClose}>Cancel</button>
      </div>
    </ModalShell>
  );
}

/* ============================ CINEMATIC SOLD OVERLAY ============================ */
// Driven by data.state.lastSale.ts so EVERY connected client plays the reveal in sync.
function SoldOverlay({ sale, onClose }) {
  const tc = teamColor(sale.team);
  const price = useCountUp(sale.price, [sale.ts], 1300);
  const [going, setGoing] = useState('GOING ONCE');
  useEffect(() => {
    fireConfetti(tc);
    const t1 = setTimeout(() => setGoing('GOING TWICE'), 600);
    const t2 = setTimeout(() => setGoing('SOLD!'), 1150);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [sale.ts]);
  return (
    <div className="sold-overlay" style={{ '--tc': tc }} onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sold-rays" />
      <div className="sold-sweep" />
      <div className="sold-going">{going}</div>
      <div className="sold-card">
        <div className="sold-left">
          <span className="pill pill-gold sold-role">{sale.role || 'Player'}</span>
          <div className="sold-stamp">SOLD</div>
          <div className="sold-player">{sale.name}</div>
          <div className="sold-price-lbl">Hammer price</div>
          <div className="sold-price">{formatCr(Math.round(price))}</div>
          <div className="sold-team">
            {sale.teamLogo
              ? <img className="sold-team-logo" src={sale.teamLogo} alt={sale.team} />
              : <div className="tdot" style={{ background: tc }}>{initials(sale.team)}</div>}
            <div>
              <div className="tl">Sold to</div>
              <div className="tn" style={{ color: '#fff' }}>{sale.team}</div>
            </div>
          </div>
        </div>
        <div className="sold-right">
          {sale.teamLogo
            ? <div className="sold-logo-wrap" style={{ '--tc': tc }}><img className="sold-logo-big" src={sale.teamLogo} alt={sale.team} /><div className="sold-logo-cap">{sale.team}</div></div>
            : sale.img
              ? <img className="sold-photo" src={sale.img} alt={sale.name} />
              : <div className="sold-photo-ph">{(sale.name || '?')[0]}</div>}
        </div>
      </div>
      <button className="btn btn-gold sold-next" onClick={onClose}>Next player →</button>
    </div>
  );
}

/* ============================ TEAM WAR ROOM (XI planner + optional bidding) ============================ */
function TeamRoomView({ data, myTeamId, plan, updatePlan, clearPlan, toast, mutate }) {
  const [addSlot, setAddSlot] = useState(0);
  const [addPid, setAddPid] = useState('');
  const [addCr, setAddCr] = useState('');

  const me = data.teams.find(t => String(t.id) === String(myTeamId));
  const st = data.state || {};
  if (!me) return <div className="panel panel-pad empty-note section-fade">Your team isn't in the auction anymore.</div>;

  const biddingOn = !!(data.settings.teamLoginEnabled && data.settings.teamBiddingEnabled);
  const slots = (plan && plan.slots) || [];
  const pById = (id) => data.players.find(p => String(p.id) === String(id));
  const liveItem = st.auctionStarted && st.currentItem ? st.currentItem : null;
  const leader = liveItem && st.currentBidder ? data.teams.find(t => String(t.id) === String(st.currentBidder)) : null;

  // Team places a bid on the live player (admin still hammers SOLD). Race-guarded inside mutate.
  const myBid = () => {
    if (!biddingOn || !mutate) return;
    if (!liveItem) return toast('No player is up for bidding', 'warn');
    const ps = paddleState(me, data);
    if (ps.isLeader) return toast("You're already the top bidder", 'info');
    if (ps.disabled) return toast(ps.reason || "You can't bid right now", 'warn');
    const targetBid = ps.nextBid;
    mutate(d => {
      const s = d.state;
      if (!s.currentItem) return;                    // player just got sold/skipped
      const inc = getDynamicIncrement(s.currentBid, d.settings);
      const newBid = s.currentBidder ? s.currentBid + inc : s.currentBid;
      if (String(s.currentBidder) === String(me.id)) return;   // already leading
      if (newBid !== targetBid) { /* someone moved first — still apply the correct next bid */ }
      if (!s.bidHistory) s.bidHistory = [];
      s.bidHistory.push({ bid: s.currentBid, bidder: s.currentBidder });
      s.currentBid = newBid; s.currentBidder = me.id;
    });
    Sound.bid && Sound.bid();
  };
  const myPs = biddingOn ? paddleState(me, data) : null;

  const candStatus = (c) => {
    const p = pById(c.playerId);
    if (!p) return { p: null, s: 'gone' };
    if (p.status === 'sold') return { p, s: (p.soldTo === me.name ? 'mine' : 'gone') };
    if (p.status === 'unsold') return { p, s: 'gone' };
    return { p, s: 'pending' };
  };
  const slotInfo = (cands) => {
    let secured = null, pending = null;
    for (let i = 0; i < cands.length; i++) { const cs = candStatus(cands[i]); if (cs.s === 'mine') { secured = { i, ...cs }; break; } }
    if (!secured) { for (let i = 0; i < cands.length; i++) { const cs = candStatus(cands[i]); if (cs.s === 'pending') { pending = { i, ...cs }; break; } } }
    const status = secured ? 'secured' : pending ? 'planned' : (cands.length ? 'lost' : 'empty');
    return { secured, pending, status };
  };

  const infos = slots.map(slotInfo);
  const plannedSpend = infos.reduce((sum, info, idx) => sum + (info.status === 'planned' ? (slots[idx][info.pending.i].amount || 0) : 0), 0);
  const securedCount = infos.filter(i => i.status === 'secured').length;
  const plannedCount = infos.filter(i => i.status === 'planned').length;
  const openCount = infos.filter(i => i.status === 'empty' || i.status === 'lost').length;
  const moneyLeft = me.remaining - plannedSpend;
  const leftPct = me.budget ? Math.max(0, Math.min(100, (moneyLeft / me.budget) * 100)) : 0;

  const chosenIds = new Set();
  slots.forEach(s => s.forEach(c => chosenIds.add(String(c.playerId))));
  const avail = data.players.filter(p => p.status === 'pending' && !chosenIds.has(String(p.id)))
    .sort((a, b) => (b.basePrice || 0) - (a.basePrice || 0));

  const pickPlayer = (pid) => {
    setAddPid(pid);
    const p = pById(pid);
    if (p) setAddCr(String(+( (p.basePrice || 0) / 100).toFixed(2)));
  };
  const addToSlot = () => {
    if (addPid === '') return toast('Pick a player', 'warn');
    const p = pById(addPid); if (!p) return;
    if (slots[addSlot] && slots[addSlot].length >= 4) return toast('That slot already has 4 options', 'warn');
    const cr = parseFloat(addCr); const amount = (!isNaN(cr) && cr > 0) ? Math.round(cr * 100) : (p.basePrice || 0);
    updatePlan(pl => { pl.slots[addSlot].push({ playerId: isNaN(+addPid) ? addPid : +addPid, amount }); });
    toast(`${p.name} → Slot ${addSlot + 1}`, 'ok');
    setAddPid(''); setAddCr('');
  };
  const removeCand = (si, ci) => updatePlan(pl => pl.slots[si].splice(ci, 1));
  const promoteCand = (si, ci) => updatePlan(pl => { const a = pl.slots[si]; const [x] = a.splice(ci, 1); a.unshift(x); });
  const setCandCr = (si, ci, crStr) => { const cr = parseFloat(crStr); updatePlan(pl => { if (pl.slots[si][ci]) pl.slots[si][ci].amount = (!isNaN(cr) && cr > 0) ? Math.round(cr * 100) : 0; }); };

  const badge = { secured: ['✓ Secured', 'b-sec'], planned: ['★ Target', 'b-plan'], lost: ['⚠ Options gone', 'b-lost'], empty: ['Open', 'b-open'] };
  const liveSlot = liveItem ? slots.findIndex(s => s.some(c => String(c.playerId) === String(liveItem.id))) : -1;

  return (
    <div className="section-fade warroom">
      {/* LIVE BID BAR — top priority when bidding is on and a player is up */}
      {biddingOn && liveItem && (
        <div className="panel panel-pad bidbar" style={{ '--team': teamColor(me.name) }}>
          <div className="bidbar-info">
            {liveItem.img ? <img className="bidbar-img" src={liveItem.img} alt="" /> : <div className="bidbar-ph">{(liveItem.name || '?')[0]}</div>}
            <div>
              <div className="bidbar-name">{liveItem.name} <span className="bidbar-role">{liveItem.role}</span></div>
              <div className="bidbar-cur">Current: <b>{formatCr(st.currentBid || liveItem.basePrice)}</b> {leader && <span style={{ color: teamColor(leader.name) }}>· {leader.name}</span>}</div>
              {liveSlot >= 0 && <div className="hint" style={{ display: 'block', color: 'var(--gold)' }}>On your plan — Slot {liveSlot + 1}</div>}
            </div>
          </div>
          <div className="bidbar-action">
            {myPs && myPs.isLeader ? (
              <div className="teambid-lead" style={{ '--team': teamColor(me.name) }}>✓ Top bidder<br />{formatCr(st.currentBid)}</div>
            ) : (
              <button className="btn btn-bid" style={{ '--team': teamColor(me.name) }} disabled={myPs && myPs.disabled} onClick={myBid}>
                <span className="bid-lbl">{(myPs && myPs.disabled) ? (myPs.reason || 'Can’t bid') : 'BID'}</span>
                {!(myPs && myPs.disabled) && <span className="bid-amt">{formatCr(myPs ? myPs.nextBid : st.currentBid)}</span>}
              </button>
            )}
            <div className="hint" style={{ textAlign: 'center', marginTop: 6 }}>Purse: <b style={{ color: 'var(--money)' }}>{formatCr(me.remaining)}</b></div>
          </div>
        </div>
      )}

      {/* Bidding on, but no player up yet — show a clear waiting state */}
      {biddingOn && !liveItem && (
        <div className="panel panel-pad bidbar bidbar-wait" style={{ '--team': teamColor(me.name) }}>
          <div className="bidbar-info">
            <div className="bidbar-ph">⏳</div>
            <div>
              <div className="bidbar-name">Bidding is live for your team</div>
              <div className="bidbar-cur">Waiting for the auctioneer to bring up the next player — your BID button appears here.</div>
            </div>
          </div>
          <div className="bidbar-action">
            <div className="hint" style={{ textAlign: 'center' }}>Purse: <b style={{ color: 'var(--money)' }}>{formatCr(me.remaining)}</b></div>
          </div>
        </div>
      )}

      {/* Planning-only: compact live player strip (bidding off) */}
      {!biddingOn && liveItem && (
        <div className="panel panel-pad bidbar" style={{ '--team': teamColor(me.name) }}>
          <div className="bidbar-info">
            {liveItem.img ? <img className="bidbar-img" src={liveItem.img} alt="" /> : <div className="bidbar-ph">{(liveItem.name || '?')[0]}</div>}
            <div>
              <div className="bidbar-name">{liveItem.name} <span className="bidbar-role">{liveItem.role}</span></div>
              <div className="bidbar-cur">On the block · Current: <b>{formatCr(st.currentBid || liveItem.basePrice)}</b> {leader && <span style={{ color: teamColor(leader.name) }}>· {leader.name}</span>}</div>
              {liveSlot >= 0 && <div className="hint" style={{ display: 'block', color: 'var(--gold)' }}>On your plan — Slot {liveSlot + 1}</div>}
            </div>
          </div>
        </div>
      )}

      {/* TEAMS & SQUADS — clubbed: purse + who's bought who */}
      <div className="panel panel-pad">
        <div className="panel-head"><span className="eyebrow">Squads</span><h2>Teams, purse & who's bought who</h2></div>
        <div className="squad-grid">
          {[...data.teams].sort((a, b) => b.remaining - a.remaining).map(t => {
            const max = (data.settings.squadRules && data.settings.squadRules.max) || 15;
            const bought = data.players.filter(p => p.status === 'sold' && p.soldTo === t.name);
            const left = Math.max(0, max - bought.length);
            const mine = String(t.id) === String(myTeamId);
            return (
              <div key={t.id} className={'squad-card' + (mine ? ' me' : '')} style={{ '--team': teamColor(t.name) }}>
                <div className="squad-head">
                  <span className="squad-name">{t.name}{mine ? ' (you)' : ''}</span>
                  <span className="squad-purse">{formatCr(t.remaining)}</span>
                </div>
                <div className="squad-sub">{bought.length} bought · {left} slots open</div>
                <div className="squad-list">
                  {bought.length === 0 ? <div className="squad-empty">No players yet</div> :
                    bought.map(p => (
                      <div key={p.id} className="squad-player">
                        <span className="sp-name">{p.name}</span>
                        <span className="sp-role">{p.role}</span>
                        <span className="sp-price">{formatCr(p.soldPrice)}</span>
                      </div>
                    ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* CALCULATOR */}
      <div className="panel panel-pad calc-card" style={{ '--team': teamColor(me.name) }}>
        <div className="calc-head">
          <div className="calc-team">
            {me.logo ? <img className="team-logo" src={me.logo} alt="" /> : <div className="team-logo-ph">{initials(me.name)}</div>}
            <div><div className="nm">{me.name}</div><div className="hint" style={{ display: 'block' }}>your XI planning room · live</div></div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={clearPlan}>Clear plan</button>
        </div>
        <div className="calc-grid">
          <div className="calc-tile"><div className="l">Purse remaining</div><div className="v">{formatCr(me.remaining)}</div></div>
          <div className="calc-tile"><div className="l">Planned spend (top picks)</div><div className="v" style={{ color: 'var(--gold)' }}>{formatCr(plannedSpend)}</div></div>
          <div className="calc-tile big"><div className="l">Money left if you land your XI</div>
            <div className="v" style={{ color: moneyLeft < 0 ? 'var(--danger)' : 'var(--money)' }}>{formatCr(moneyLeft)}</div>
            {moneyLeft < 0 && <div className="hint" style={{ display: 'block', color: 'var(--danger)' }}>Over budget by {formatCr(-moneyLeft)} — trim a target.</div>}
          </div>
        </div>
        <div className="calc-bar"><span style={{ width: leftPct + '%' }} /></div>
        <div className="calc-foot">
          <span className="cf sec">✓ {securedCount} secured</span>
          <span className="cf plan">★ {plannedCount} targeted</span>
          <span className="cf open">○ {openCount} open</span>
          <span className="cf">of {XI_SLOTS} slots</span>
        </div>
      </div>

      {/* BUILD XI — players I want to buy */}
      <div className="panel panel-pad">
        <div className="panel-head"><span className="eyebrow">Build</span><h2>Players I want — up to 4 options per slot</h2></div>
        <div className="addbar">
          <select className="input" value={addPid} onChange={e => pickPlayer(e.target.value)}>
            <option value="">— Pick a player ({avail.length} left) —</option>
            {avail.map(p => <option key={p.id} value={p.id}>{p.name} · {p.role} · base {formatCr(p.basePrice)}</option>)}
          </select>
          <select className="input addbar-slot" value={addSlot} onChange={e => setAddSlot(+e.target.value)}>
            {Array.from({ length: XI_SLOTS }, (_, i) => (
              <option key={i} value={i} disabled={slots[i] && slots[i].length >= 4}>Slot {i + 1} ({(slots[i] || []).length}/4)</option>
            ))}
          </select>
          <div className="addbar-cr"><span>Cr</span><input className="input" type="number" min="0" step="0.1" value={addCr} placeholder="base" onChange={e => setAddCr(e.target.value)} /></div>
          <button className="btn btn-gold" onClick={addToSlot}>Add</button>
        </div>
        <p className="hint">Add who you want for each slot — line up to 4 options (top one is your pick; the rest are back-ups if it's sold). The calculator counts your top still-available option per slot. Private to your team.</p>

        <div className="xi-grid">
          {slots.map((cands, si) => {
            const info = infos[si];
            const [blabel, bcls] = badge[info.status];
            return (
              <div key={si} className={'slot-card ' + bcls + (liveSlot === si ? ' live' : '')}>
                <div className="slot-head">
                  <span className="slot-no">Slot {si + 1}</span>
                  <span className={'slot-badge ' + bcls}>{blabel}</span>
                </div>
                {cands.length === 0 ? <div className="slot-empty">No targets yet</div> :
                  cands.map((c, ci) => {
                    const cs = candStatus(c);
                    const isPick = info.pending && info.pending.i === ci && !info.secured;
                    const isWon = info.secured && info.secured.i === ci;
                    const gone = cs.s === 'gone';
                    const nm = cs.p ? cs.p.name : 'Removed player';
                    return (
                      <div key={ci} className={'cand' + (isPick ? ' pick' : '') + (isWon ? ' won' : '') + (gone ? ' gone' : '')}>
                        <div className="cand-top">
                          <span className="cand-rank">{isWon ? '✓' : isPick ? '★' : ci + 1}</span>
                          <span className="cand-name">{nm}{cs.p && <em>{cs.p.role}</em>}</span>
                          <span className="cand-act">
                            {!isWon && ci > 0 && !gone && <button title="Make top pick" onClick={() => promoteCand(si, ci)}>▲</button>}
                            <button title="Remove" onClick={() => removeCand(si, ci)}>✕</button>
                          </span>
                        </div>
                        <div className="cand-bottom">
                          {gone ? <span className="cand-gone">{cs.p && cs.p.status === 'sold' ? `Sold · ${cs.p.soldTo}` : 'Gone'}</span> :
                            isWon ? <span className="cand-won">Won · {formatCr(cs.p.soldPrice)}</span> :
                            <><span className="cand-cr">Max</span><input className="input cand-bud-input" type="number" min="0" step="0.1"
                              value={c.amount ? +(c.amount / 100).toFixed(2) : ''} placeholder="—"
                              onChange={e => setCandCr(si, ci, e.target.value)} /><span className="cand-cr">Cr</span></>}
                        </div>
                      </div>
                    );
                  })}
                {info.status === 'planned' && <div className="slot-foot">Targeting <b>{info.pending.p.name}</b> · {formatCr(slots[si][info.pending.i].amount || 0)}</div>}
                {info.status === 'secured' && <div className="slot-foot sec">Won <b>{info.secured.p.name}</b> · {formatCr(info.secured.p.soldPrice)}</div>}
                {info.status === 'lost' && <div className="slot-foot lost">All options sold — add another</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ============================ APP ROOT ============================ */
function App() {
  const [data, setData] = useState(DEFAULT_DATA);
  const dataRef = useRef(data);
  dataRef.current = data;

  const [isAdmin, setIsAdmin] = useState(false);
  const [myTeamId, setMyTeamId] = useState(null);   // team-login: which team this device is planning as
  const [plan, setPlan] = useState(emptyPlan());   // this team's private XI plan (own cloud doc)
  const planRef = useRef(plan);
  planRef.current = plan;
  const [tab, setTab] = useState('auction');
  const [soundOn, setSoundOnState] = useState(false);
  const [connected, setConnected] = useState(false);
  const [modal, setModal] = useState(null);          // {type, ...payload}
  const [toasts, setToasts] = useState([]);
  const [overlaySale, setOverlaySale] = useState(null);
  const lastSeenSale = useRef(0);
  const firstSnap = useRef(true);

  /* ---------- Toasts ---------- */
  const toast = useCallback((msg, kind = 'ok') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, kind }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);

  /* ---------- Sound toggle ---------- */
  const setSoundOn = useCallback((updater) => {
    setSoundOnState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      Sound.setOn(next);
      return next;
    });
  }, []);

  /* ---------- Cloud sync: cloud is the source of truth ---------- */
  useEffect(() => {
    let unsub = null;
    const attach = () => {
      const fb = window.AUC_FB;
      if (!fb) return false;
      setConnected(true);
      const ref = fb.doc(fb.db, 'auctions', 'current');
      unsub = fb.onSnapshot(ref, (snap) => {
        if (snap.exists() && snap.data() && snap.data().data) {
          const incoming = snap.data().data;
          // merge in any new fields from DEFAULT so older docs stay valid
          incoming.state = Object.assign({}, DEFAULT_DATA.state, incoming.state);
          incoming.settings = Object.assign({}, DEFAULT_DATA.settings, incoming.settings);
          // On the very first snapshot, baseline the last-sale timestamp so an
          // existing sale in the cloud doc does NOT replay the cinematic on load.
          if (firstSnap.current) {
            lastSeenSale.current = (incoming.state.lastSale && incoming.state.lastSale.ts) || 0;
          }
          setData(incoming);
        } else if (firstSnap.current) {
          // no doc yet — seed it once
          fb.setDoc(ref, { data: DEFAULT_DATA }).catch(() => {});
        }
        firstSnap.current = false;
      }, (err) => { console.error('snapshot error', err); toast('Cloud connection issue — retrying', 'warn'); });
      return true;
    };
    if (!attach()) {
      const onReady = () => attach();
      window.addEventListener('firebase-ready', onReady, { once: true });
      // poll fallback in case the event already fired
      const iv = setInterval(() => { if (window.AUC_FB) { clearInterval(iv); attach(); } }, 300);
      return () => { window.removeEventListener('firebase-ready', onReady); clearInterval(iv); if (unsub) unsub(); };
    }
    return () => { if (unsub) unsub(); };
  }, []);

  /* ---------- Save to cloud ---------- */
  const save = useCallback((d) => {
    const fb = window.AUC_FB;
    if (!fb) { toast('Not connected to cloud yet', 'warn'); return; }
    const ref = fb.doc(fb.db, 'auctions', 'current');
    fb.setDoc(ref, { data: d }).catch((err) => {
      const m = (err && err.message) || '';
      if (/exceeds the maximum|resource-exhausted|longer than/i.test(m)) {
        toast('Data too large for cloud (1MB cap). Use smaller images or URLs.', 'err');
      } else {
        toast('Save failed — change kept locally', 'err');
      }
      console.error('save error', err);
    });
  }, [toast]);

  /* ---------- Mutate: optimistic local + cloud write ---------- */
  const mutate = useCallback((fn) => {
    const draft = clone(dataRef.current);
    fn(draft);
    dataRef.current = draft;
    setData(draft);
    save(draft);
  }, [save]);

  /* ---------- Body lock class + role banner ---------- */
  useEffect(() => {
    document.body.classList.toggle('locked', !isAdmin);
    document.body.classList.toggle('team-mode', !!myTeamId && !isAdmin);
    const banner = document.getElementById('viewerBanner');
    if (banner) {
      if (myTeamId && !isAdmin) {
        const t = (dataRef.current.teams || []).find(x => x.id === myTeamId);
        banner.textContent = `🎯 ${t ? t.name.toUpperCase() : 'YOUR TEAM'} WAR ROOM · plan your targets & track purses live — tap the lock to log out`;
      } else {
        banner.textContent = '👁 VIEWER MODE · Read-only — unlock to control the auction or log in as a team';
      }
    }
  }, [isAdmin, myTeamId, data.teams]);

  /* ---------- If my team gets removed, drop back to viewer ---------- */
  useEffect(() => {
    if (myTeamId && !data.teams.some(t => t.id === myTeamId)) { setMyTeamId(null); toast('Your team is no longer in the auction', 'info'); }
    if (myTeamId && !data.settings.teamLoginEnabled) { setMyTeamId(null); toast('Team planning rooms were turned off', 'info'); }
  }, [data.teams, data.settings.teamLoginEnabled]);

  /* ---------- Team plan: live-sync this team's private XI plan in its OWN cloud doc ---------- */
  // Kept in a separate doc per team so concurrent edits never clobber the main auction doc.
  useEffect(() => {
    if (!myTeamId) { setPlan(emptyPlan()); return; }
    const fb = window.AUC_FB; if (!fb) return;
    const ref = fb.doc(fb.db, 'auctions', 'plan_' + String(myTeamId));
    const unsub = fb.onSnapshot(ref, (snap) => {
      setPlan(normalizePlan(snap.exists() ? snap.data() : null));
    }, (e) => console.error('plan snapshot', e));
    return () => unsub();
  }, [myTeamId, connected]);

  const updatePlan = useCallback((fn) => {
    if (!myTeamId) return;
    const next = normalizePlan(planRef.current);
    fn(next);
    next.updated = Date.now();
    planRef.current = next; setPlan(next);
    const fb = window.AUC_FB; if (!fb) return;
    fb.setDoc(fb.doc(fb.db, 'auctions', 'plan_' + String(myTeamId)), next).catch(e => console.error('plan save', e));
  }, [myTeamId]);

  const clearPlan = useCallback(() => {
    if (!myTeamId) return;
    const next = emptyPlan(); next.updated = Date.now();
    planRef.current = next; setPlan(next);
    const fb = window.AUC_FB; if (!fb) return;
    fb.setDoc(fb.doc(fb.db, 'auctions', 'plan_' + String(myTeamId)), next).catch(e => console.error('plan clear', e));
    toast('Plan cleared', 'info');
  }, [myTeamId]);

  /* ---------- Drive cinematic on EVERY client via lastSale.ts ---------- */
  useEffect(() => {
    const ls = data.state && data.state.lastSale;
    if (ls && ls.ts && ls.ts !== lastSeenSale.current) {
      lastSeenSale.current = ls.ts;
      setOverlaySale(ls);
    }
  }, [data.state && data.state.lastSale && data.state.lastSale.ts]);

  /* ---------- Login / logout ---------- */
  const onLockToggle = () => {
    if (isAdmin || myTeamId) {
      setIsAdmin(false); setMyTeamId(null);
      setTab(t => (t === 'setup' || t === 'warroom') ? 'auction' : t);
      toast('Logged out — viewer mode', 'info');
    } else {
      setModal({ type: 'login' });
    }
  };

  /* ---------- Keyboard shortcuts (admin only) ---------- */
  useEffect(() => {
    if (!isAdmin) return;
    const onKey = (e) => {
      if (modal || overlaySale) return;
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'select' || tag === 'textarea') return;
      if (tab !== 'auction') return;
      const H = AuctionView._handlers; if (!H) return;
      if (e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key, 10) - 1;
        const t = dataRef.current.teams[idx];
        if (t && H.hasItem) H.placeBid(t.id);
      } else if (e.key.toLowerCase() === 's') { if (H.hasItem) H.sell(); }
      else if (e.key.toLowerCase() === 'u') { if (H.hasItem) H.unsold(); }
      else if (e.key.toLowerCase() === 'k') { if (H.hasItem) H.skip(); }
      else if (e.code === 'Space') { e.preventDefault(); if (H.isReady && !H.spinning) H.doSpin(); }
      else if (e.key.toLowerCase() === 'z') { H.undoBid(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [isAdmin, tab, modal, overlaySale]);

  /* ---------- Excel / JSON import-export ---------- */
  const fileImportExcel = (input) => {
    const file = input && input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        let nT = 0, nP = 0;
        mutate(d => {
          if (wb.Sheets['Teams']) {
            XLSX.utils.sheet_to_json(wb.Sheets['Teams']).forEach(r => {
              const name = r.Name || r.TeamName || r.name;
              const budget = Number(r.Budget || r.budget);
              const logo = r.Logo || r.LogoURL || r.logo || null;
              if (!name || !budget || budget <= 0) return;
              if (d.teams.some(t => t.name.toLowerCase() === String(name).trim().toLowerCase())) return;
              d.teams.push({ id: Date.now() + Math.random(), name: String(name).trim(), budget, remaining: budget, logo, players: [], playerCount: 0 });
              nT++;
            });
          }
          if (wb.Sheets['Players']) {
            const pick = (r, keys) => { for (const k of keys) { if (r[k] !== undefined && r[k] !== '') return r[k]; } return undefined; };
            const num = (v) => { if (v === undefined || v === '' || v === '-') return null; const n = parseFloat(v); return isNaN(n) ? null : n; };
            XLSX.utils.sheet_to_json(wb.Sheets['Players']).forEach(r => {
              const name = r.Name || r.PlayerName || r.name || r.Player;
              if (!name) return;
              const stats = {
                mat: num(pick(r, ['Matches', 'Mat', 'M', 'Matches Played'])),
                runs: num(pick(r, ['Runs', 'RunsScored', 'Runs Scored'])),
                wkts: num(pick(r, ['Wickets', 'Wkts', 'W', 'Wickets Taken'])),
                avg: num(pick(r, ['Bat Avg', 'Batting Average', 'BattingAverage', 'Avg', 'Average'])),
                sr: num(pick(r, ['Bat SR', 'Strike Rate', 'StrikeRate', 'SR', 'Batting Strike Rate'])),
                econ: num(pick(r, ['Bowl Econ', 'Economy', 'Econ', 'Bowling Economy'])),
              };
              const player = {
                id: Date.now() + Math.random(),
                name: String(name).trim(),
                role: r.Role || r.role || r['Suggested Role'] || 'Batsman',
                basePrice: Number(r.BasePrice || r.Price || r.basePrice || r.baseprice) || 20,
                img: r.Image || r.ImageURL || r.ProfilePicture || r.img || '',
                status: 'pending', soldTo: null, soldPrice: 0,
              };
              if (hasStats(stats)) player.stats = stats;
              d.players.push(player);
              nP++;
            });
          }
        });
        toast(`Imported ${nT} teams, ${nP} players`, 'ok');
      } catch (err) { console.error(err); toast('Could not read that Excel file', 'err'); }
      input.value = '';
    };
    reader.readAsArrayBuffer(file);
  };

  const exportExcel = () => {
    const d = dataRef.current;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(d.teams), 'Teams');
    const prows = d.players.map(p => { const s = p.stats || {}; return {
      Name: p.name, Role: p.role, BasePrice: p.basePrice, Image: p.img,
      Status: p.status, SoldTo: p.soldTo, SoldPrice: p.soldPrice,
      Matches: s.mat, Runs: s.runs, Wickets: s.wkts, 'Bat Avg': s.avg, 'Bat SR': s.sr, 'Bowl Econ': s.econ };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prows), 'Players');
    XLSX.writeFile(wb, 'auction_data.xlsx');
    toast('Excel exported', 'ok');
  };

  const exportSquads = () => {
    const d = dataRef.current;
    if (d.teams.length === 0) { toast('No teams to export yet', 'warn'); return; }
    const wb = XLSX.utils.book_new();
    // Summary sheet
    const summary = d.teams.map(t => {
      const owned = d.players.filter(p => p.status === 'sold' && p.soldTo === t.name);
      const spent = owned.reduce((s, p) => s + (p.soldPrice || 0), 0);
      return { Team: t.name, Players: owned.length, Budget_Cr: t.budget / 100, Spent_Cr: spent / 100, Remaining_Cr: t.remaining / 100 };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'Summary');
    // One sheet per team
    const used = {};
    d.teams.forEach(t => {
      const owned = d.players.filter(p => p.status === 'sold' && p.soldTo === t.name);
      const rows = owned.map((p, i) => ({ '#': i + 1, Player: p.name, Role: p.role, Price_Cr: (p.soldPrice || 0) / 100, Base_Cr: (p.basePrice || 0) / 100 }));
      const spent = owned.reduce((s, p) => s + (p.soldPrice || 0), 0);
      rows.push({});
      rows.push({ Player: 'TOTAL SPENT', Price_Cr: spent / 100 });
      rows.push({ Player: 'REMAINING', Price_Cr: t.remaining / 100 });
      // sheet names: max 31 chars, unique, no special chars
      let name = (t.name || 'Team').replace(/[\\/?*\[\]:]/g, '').slice(0, 28) || 'Team';
      let base = name, k = 2; while (used[name.toLowerCase()]) { name = (base.slice(0, 26) + '_' + k); k++; }
      used[name.toLowerCase()] = true;
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.length ? rows : [{ Player: 'No players yet' }]), name);
    });
    XLSX.writeFile(wb, 'squads.xlsx');
    toast('Squad sheets exported', 'ok');
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(dataRef.current, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'auction_backup.json'; a.click();
    URL.revokeObjectURL(url);
    toast('JSON backup saved', 'ok');
  };

  const importJSON = (input) => {
    const file = input && input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const obj = JSON.parse(e.target.result);
        if (!obj.teams || !obj.players) throw new Error('bad');
        obj.state = Object.assign({}, DEFAULT_DATA.state, obj.state || {});
        obj.settings = Object.assign({}, DEFAULT_DATA.settings, obj.settings || {});
        mutate(d => { Object.assign(d, obj); });
        toast('Backup restored', 'ok');
      } catch (err) { toast('Invalid backup file', 'err'); }
      input.value = '';
    };
    reader.readAsText(file);
  };

  const sampleExcel = () => {
    const teams = [
      { Name: 'Royal Challengers', Budget: 1000, Logo: '' },
      { Name: 'Chennai Super Kings', Budget: 1000, Logo: '' },
      { Name: 'Mumbai Indians', Budget: 1000, Logo: '' },
      { Name: 'Kolkata Knight Riders', Budget: 1000, Logo: '' },
    ];
    const named = [
      { Name: 'Virat Kohli', Role: 'Batsman', BasePrice: 200, Matches: 12, Runs: 480, Wickets: 0, 'Bat Avg': 48.0, 'Bat SR': 142.5, 'Bowl Econ': 0 },
      { Name: 'Rohit Sharma', Role: 'Batsman', BasePrice: 200, Matches: 12, Runs: 410, Wickets: 0, 'Bat Avg': 37.3, 'Bat SR': 138.2, 'Bowl Econ': 0 },
      { Name: 'MS Dhoni', Role: 'Wicket-Keeper', BasePrice: 200, Matches: 11, Runs: 280, Wickets: 0, 'Bat Avg': 35.0, 'Bat SR': 150.5, 'Bowl Econ': 0 },
      { Name: 'Jasprit Bumrah', Role: 'Bowler', BasePrice: 200, Matches: 12, Runs: 24, Wickets: 22, 'Bat Avg': 8.0, 'Bat SR': 90.0, 'Bowl Econ': 6.4 },
      { Name: 'Hardik Pandya', Role: 'All-Rounder', BasePrice: 150, Matches: 12, Runs: 260, Wickets: 14, 'Bat Avg': 28.9, 'Bat SR': 155.0, 'Bowl Econ': 8.1 },
      { Name: 'Ravindra Jadeja', Role: 'All-Rounder', BasePrice: 150, Matches: 12, Runs: 190, Wickets: 16, 'Bat Avg': 27.1, 'Bat SR': 135.7, 'Bowl Econ': 7.2 },
      { Name: 'KL Rahul', Role: 'Wicket-Keeper', BasePrice: 150, Matches: 11, Runs: 395, Wickets: 0, 'Bat Avg': 43.9, 'Bat SR': 134.4, 'Bowl Econ': 0 },
      { Name: 'Shubman Gill', Role: 'Batsman', BasePrice: 100, Matches: 12, Runs: 440, Wickets: 0, 'Bat Avg': 40.0, 'Bat SR': 139.1, 'Bowl Econ': 0 },
      { Name: 'Mohammed Shami', Role: 'Bowler', BasePrice: 100, Matches: 11, Runs: 18, Wickets: 19, 'Bat Avg': 6.0, 'Bat SR': 85.0, 'Bowl Econ': 7.8 },
      { Name: 'Rishabh Pant', Role: 'Wicket-Keeper', BasePrice: 100, Matches: 12, Runs: 350, Wickets: 0, 'Bat Avg': 31.8, 'Bat SR': 148.9, 'Bowl Econ': 0 },
    ].map(p => ({ ...p, Image: `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(p.Name)}` }));
    const filler = Array.from({ length: 40 }, (_, i) => ({
      Name: `Player ${i + 11}`,
      Role: ['Batsman', 'Bowler', 'All-Rounder', 'Wicket-Keeper'][i % 4],
      BasePrice: 20 + (i % 5) * 10,
      Matches: 8 + (i % 5), Runs: 40 + (i * 7) % 300, Wickets: (i % 4 === 1 || i % 4 === 2) ? 5 + (i % 12) : 0,
      'Bat Avg': +(10 + (i * 3) % 35).toFixed(1), 'Bat SR': +(95 + (i * 5) % 70).toFixed(1),
      'Bowl Econ': (i % 4 === 1 || i % 4 === 2) ? +(6 + (i % 6) * 0.5).toFixed(1) : 0,
      Image: `https://api.dicebear.com/7.x/avataaars/svg?seed=${i + 11}`,
    }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(teams), 'Teams');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([...named, ...filler]), 'Players');
    XLSX.writeFile(wb, 'Sample_Auction_Data.xlsx');
    toast('Sample file downloaded', 'ok');
  };

  const resetAll = () => setModal({ type: 'confirm', title: 'Reset everything?',
    sub: 'This clears all teams, players and auction progress for every connected device. This cannot be undone.',
    confirmLabel: 'Yes, reset auction', danger: true,
    onConfirm: () => { mutate(d => { Object.assign(d, clone(DEFAULT_DATA)); }); toast('Auction reset', 'info'); } });

  /* ---------- Modal openers passed to views ---------- */
  const openManualSell = (item, finalize) => { if (item) setModal({ type: 'manualsell', item, finalize }); };
  const openPreAssign = (player) => setModal({ type: 'assign', player });
  const openEditSale = (player) => setModal({ type: 'editsale', player });
  const openShare = () => setModal({ type: 'qr' });

  /* ---------- Render ---------- */
  const view = (() => {
    // Logged-in teams are locked to their War Room — no other view renders.
    if (myTeamId && !isAdmin) {
      return <TeamRoomView data={data} myTeamId={myTeamId} plan={plan} updatePlan={updatePlan} clearPlan={clearPlan} toast={toast} mutate={mutate} />;
    }
    switch (tab) {
      case 'setup': return isAdmin ? <SetupView data={data} mutate={mutate} toast={toast}
        fileImportExcel={fileImportExcel} exportExcel={exportExcel} exportJSON={exportJSON}
        importJSON={importJSON} sampleExcel={sampleExcel} resetAll={resetAll} /> : null;
      case 'teams': return <TeamsView data={data} exportSquads={exportSquads} />;
      case 'dashboard': return <DashboardView data={data} />;
      case 'warroom': return myTeamId ? <TeamRoomView data={data} myTeamId={myTeamId} plan={plan} updatePlan={updatePlan} clearPlan={clearPlan} toast={toast} mutate={mutate} /> : null;
      case 'players': return <PlayersView data={data} mutate={mutate} isAdmin={isAdmin} toast={toast}
        openPreAssign={openPreAssign} openEditSale={openEditSale} />;
      case 'auction':
      default: return <AuctionView data={data} mutate={mutate} isAdmin={isAdmin} toast={toast}
        openManualSell={openManualSell} myTeamId={myTeamId} teamLoginEnabled={data.settings.teamLoginEnabled} />;
    }
  })();

  return (
    <ToastCtx.Provider value={toast}>
      <TopBar tab={tab} setTab={setTab} isAdmin={isAdmin} myTeamId={myTeamId} onLockToggle={onLockToggle}
        soundOn={soundOn} setSoundOn={setSoundOn} connected={connected} onShare={openShare} />
      <Ticker data={data} />
      <main className="shell">{view}</main>

      {/* Modals */}
      {modal && modal.type === 'login' && <LoginModal data={data} toast={toast} onClose={() => setModal(null)}
        onAdmin={() => { setIsAdmin(true); setMyTeamId(null); setModal(null); toast('Auctioneer unlocked', 'ok'); }}
        onTeam={(teamId, teamName) => { setMyTeamId(teamId); setIsAdmin(false); setTab('warroom'); setModal(null); toast(`Logged in as ${teamName}`, 'ok'); }} />}
      {modal && modal.type === 'qr' && <ShareModal onClose={() => setModal(null)} toast={toast} />}
      {modal && modal.type === 'manualsell' && <ManualSellModal item={modal.item} finalize={modal.finalize}
        data={data} toast={toast} onClose={() => setModal(null)} />}
      {modal && modal.type === 'assign' && <AssignModal player={modal.player} data={data} mutate={mutate}
        toast={toast} onClose={() => setModal(null)} />}
      {modal && modal.type === 'editsale' && <EditSaleModal player={modal.player} data={data} mutate={mutate}
        toast={toast} onClose={() => setModal(null)} />}
      {modal && modal.type === 'confirm' && <ConfirmModal {...modal} onClose={() => setModal(null)} />}

      {/* Cinematic reveal */}
      {overlaySale && <SoldOverlay sale={overlaySale} onClose={() => setOverlaySale(null)} />}

      {/* Toasts */}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={'toast ' + t.kind}>{t.msg}</div>)}
      </div>

      {!connected && <div style={{ position: 'fixed', bottom: 16, left: 16, zIndex: 300, padding: '8px 14px', borderRadius: 10, fontSize: '0.8rem', fontWeight: 600, background: 'rgba(2,4,10,0.85)', border: '1px solid var(--line-strong)', color: 'var(--warn)' }}>Connecting to cloud…</div>}
    </ToastCtx.Provider>
  );
}

/* ============================ MOUNT ============================ */
const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<Boundary><App /></Boundary>);
    </script>
</body>
</html>
